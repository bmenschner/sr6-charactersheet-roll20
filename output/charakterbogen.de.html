<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./charakterbogen.de.css" />
  </head>
  <body>
    <div class="sr6-layout">
      <section class="sr6-box sr6-box--persoenliche-daten" aria-labelledby="persoenliche-daten-titel">
        <h1 id="persoenliche-daten-titel" class="sr6-box-title">Persönliche Daten</h1>

        <div class="sr6-box-content">
          <div class="sr6-row sr6-row--2">
            <label class="sr6-field">
              <span>Metatyp</span>
              <input type="text" name="attr_metatyp" />
            </label>

            <label class="sr6-field">
              <span>Ethnizität</span>
              <input type="text" name="attr_ethnizitaet" />
            </label>
          </div>

          <div class="sr6-row sr6-row--4">
            <label class="sr6-field">
              <span>Alter</span>
              <input type="text" name="attr_alter" />
            </label>

            <label class="sr6-field">
              <span>Geschlecht</span>
              <input type="text" name="attr_geschlecht" />
            </label>

            <label class="sr6-field">
              <span>Größe</span>
              <input type="text" name="attr_groesse" />
            </label>

            <label class="sr6-field">
              <span>Gewicht</span>
              <input type="text" name="attr_gewicht" />
            </label>
          </div>

          <div class="sr6-row sr6-row--2">
            <label class="sr6-field">
              <span>Reputation</span>
              <input type="text" name="attr_reputation" />
            </label>

            <label class="sr6-field">
              <span>Fahndungslevel</span>
              <input type="text" name="attr_fahndungslevel" />
            </label>
          </div>

          <div class="sr6-row sr6-row--4">
            <label class="sr6-field">
              <span>Karma</span>
              <input type="text" name="attr_karma" />
            </label>

            <label class="sr6-field">
              <span>Gesamtkarma</span>
              <input type="text" name="attr_gesamtkarma" />
            </label>

            <label class="sr6-field">
              <span>Edge</span>
              <input type="text" name="attr_edge" />
            </label>

            <label class="sr6-field">
              <span>Edge Max</span>
              <input type="text" name="attr_edge_max" />
            </label>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
