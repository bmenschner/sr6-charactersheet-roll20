    <script type="text/worker">
      // Basis-Attributliste fuer die automatische Neuberechnung.
      const SR6_ATTRIBUTES = [
        "konstitution",
        "geschicklichkeit",
        "reaktion",
        "staerke",
        "willenskraft",
        "logik",
        "intuition",
        "charisma",
        "edge",
        "magie_resonanz"
      ];

      // Parse helper mit Roll20-sicherem 0-Fallback.
      function parseNumber(value) {
        const parsed = parseInt(value, 10);
        return Number.isNaN(parsed) ? 0 : parsed;
      }

      function normalizeText(value) {
        return (value || "").trim().toLowerCase();
      }

      // Recompute-Flow: liest Grundwerte/Modifikatoren und schreibt Gesamt/Derived-Werte.
      function recomputeAll() {
        const requestKeys = [];
        const updates = {};
        const totals = {};

        SR6_ATTRIBUTES.forEach((attributeName) => {
          requestKeys.push(`sr6_attr_${attributeName}_grundwert`);
          requestKeys.push(`sr6_attr_${attributeName}_modifikator`);
        });

        getAttrs(requestKeys, (values) => {
          SR6_ATTRIBUTES.forEach((attributeName) => {
            const baseKey = `sr6_attr_${attributeName}_grundwert`;
            const modifierKey = `sr6_attr_${attributeName}_modifikator`;
            const totalKey = `sr6_attr_${attributeName}_gesamtwert`;
            const total = parseNumber(values[baseKey]) + parseNumber(values[modifierKey]);

            totals[attributeName] = total;
            updates[totalKey] = String(total);
          });

          const reaktion = totals.reaktion || 0;
          const intuition = totals.intuition || 0;
          const konstitution = totals.konstitution || 0;
          const willenskraft = totals.willenskraft || 0;
          const edge = totals.edge || 0;

          updates.sr6_derived_initiative_basis = String(reaktion + intuition);
          updates.sr6_derived_verteidigung_basis = String(reaktion + intuition);
          updates.sr6_derived_koerperlicher_monitor_max = String(8 + Math.ceil(konstitution / 2));
          updates.sr6_derived_geistiger_monitor_max = String(8 + Math.ceil(willenskraft / 2));
          updates.sr6_derived_edge_basis = String(edge);

          setAttrs(updates, { silent: true });
        });
      }

      // Berechnet Fernkampf-Effektivwerte aus Basiswerten + aktiven Modifikatoren.
      function recomputeFernkampfMods() {
        const rangeFields = ["s_nah", "nah", "mittel", "weit", "s_weit"];

        getSectionIDs("repeating_sr6fernkampfwaffen", (waffenIds) => {
          getSectionIDs("repeating_sr6combatmods", (modIds) => {
            const weaponKeys = [];
            const modKeys = [];

            waffenIds.forEach((id) => {
              weaponKeys.push(`repeating_sr6fernkampfwaffen_${id}_fernkampfwaffe`);
              rangeFields.forEach((field) => {
                weaponKeys.push(`repeating_sr6fernkampfwaffen_${id}_fernkampf_${field}`);
              });
            });

            modIds.forEach((id) => {
              modKeys.push(`repeating_sr6combatmods_${id}_mod_target_waffe`);
              modKeys.push(`repeating_sr6combatmods_${id}_mod_aktiv`);
              rangeFields.forEach((field) => {
                modKeys.push(`repeating_sr6combatmods_${id}_mod_${field}`);
              });
            });

            const allKeys = [...weaponKeys, ...modKeys];
            if (!allKeys.length) {
              return;
            }

            getAttrs(allKeys, (values) => {
              const updates = {};
              const modsByTarget = {};

              modIds.forEach((id) => {
                const target = normalizeText(
                  values[`repeating_sr6combatmods_${id}_mod_target_waffe`]
                );
                if (!target) {
                  return;
                }

                const activeRaw = (values[`repeating_sr6combatmods_${id}_mod_aktiv`] || "")
                  .trim()
                  .toLowerCase();
                const isActive = activeRaw === "1" || activeRaw === "on" || activeRaw === "ja";
                if (!isActive) {
                  return;
                }

                if (!modsByTarget[target]) {
                  modsByTarget[target] = {
                    s_nah: 0,
                    nah: 0,
                    mittel: 0,
                    weit: 0,
                    s_weit: 0,
                  };
                }

                rangeFields.forEach((field) => {
                  modsByTarget[target][field] += parseNumber(
                    values[`repeating_sr6combatmods_${id}_mod_${field}`]
                  );
                });
              });

              waffenIds.forEach((id) => {
                const weaponName = normalizeText(
                  values[`repeating_sr6fernkampfwaffen_${id}_fernkampfwaffe`]
                );
                const modTotals = modsByTarget[weaponName] || {
                  s_nah: 0,
                  nah: 0,
                  mittel: 0,
                  weit: 0,
                  s_weit: 0,
                };

                rangeFields.forEach((field) => {
                  const baseValue = parseNumber(
                    values[`repeating_sr6fernkampfwaffen_${id}_fernkampf_${field}`]
                  );
                  const effectiveValue = baseValue + modTotals[field];
                  updates[
                    `repeating_sr6fernkampfwaffen_${id}_fernkampf_${field}_effektiv`
                  ] = String(effectiveValue);
                });
              });

              setAttrs(updates, { silent: true });
            });
          });
        });
      }

      // Migration: altes Checkbox-Format konnte "on" in Helm hinterlassen.
      function normalizeLegacyCheckboxValues() {
        getAttrs(["sr6_combat_helm"], (values) => {
          if ((values.sr6_combat_helm || "").trim().toLowerCase() === "on") {
            setAttrs({ sr6_combat_helm: "" }, { silent: true });
          }
        });
      }

      // Eventliste: reagiert auf Aenderungen in allen relevanten Attributfeldern.
      const recalcEvents = [];
      SR6_ATTRIBUTES.forEach((attributeName) => {
        recalcEvents.push(`change:sr6_attr_${attributeName}_grundwert`);
        recalcEvents.push(`change:sr6_attr_${attributeName}_modifikator`);
      });

      const combatModEvents = [
        "change:repeating_sr6fernkampfwaffen:fernkampfwaffe",
        "change:repeating_sr6fernkampfwaffen:fernkampf_s_nah",
        "change:repeating_sr6fernkampfwaffen:fernkampf_nah",
        "change:repeating_sr6fernkampfwaffen:fernkampf_mittel",
        "change:repeating_sr6fernkampfwaffen:fernkampf_weit",
        "change:repeating_sr6fernkampfwaffen:fernkampf_s_weit",
        "change:repeating_sr6combatmods:mod_target_waffe",
        "change:repeating_sr6combatmods:mod_aktiv",
        "change:repeating_sr6combatmods:mod_s_nah",
        "change:repeating_sr6combatmods:mod_nah",
        "change:repeating_sr6combatmods:mod_mittel",
        "change:repeating_sr6combatmods:mod_weit",
        "change:repeating_sr6combatmods:mod_s_weit",
        "remove:repeating_sr6fernkampfwaffen",
        "remove:repeating_sr6combatmods",
      ];

      on(recalcEvents.join(" "), recomputeAll);
      on(combatModEvents.join(" "), recomputeFernkampfMods);
      on("sheet:opened", () => {
        normalizeLegacyCheckboxValues();
        recomputeAll();
        recomputeFernkampfMods();
      });
      on("change:sr6_combat_helm", normalizeLegacyCheckboxValues);
    </script>

        // Sprachverwaltung mit LocalStorage-Fallback auf Deutsch.
        const STORAGE_KEY = "sr6_i18n_lang";
        const FALLBACK_LANGUAGE = "de";
        const availableLanguages = Object.keys(translations);

        function resolveLanguage(candidate) {
          return availableLanguages.includes(candidate)
            ? candidate
            : FALLBACK_LANGUAGE;
        }

        // Wendet die gewaehlte Sprache auf alle data-i18n Knoten an.
        function applyLanguage(lang) {
          const activeLanguage = resolveLanguage(lang);
          const locale = translations[activeLanguage];
          document.documentElement.lang = activeLanguage;

          document.querySelectorAll("[data-i18n]").forEach((node) => {
            const key = node.getAttribute("data-i18n");
            if (locale[key]) {
              node.textContent = locale[key];
            }
          });

          const picker = document.getElementById("sr6-language-select");
          if (picker && picker.value !== activeLanguage) {
            picker.value = activeLanguage;
          }

          try {
            localStorage.setItem(STORAGE_KEY, activeLanguage);
          } catch (err) {}
        }

        // Initiale Sprache aus Storage oder aus <html lang>.
        function getInitialLanguage() {
          try {
            const storedLanguage = localStorage.getItem(STORAGE_KEY);
            if (storedLanguage) {
              return resolveLanguage(storedLanguage);
            }
          } catch (err) {}
          return resolveLanguage(document.documentElement.lang);
        }

        document.addEventListener("DOMContentLoaded", () => {
          const picker = document.getElementById("sr6-language-select");
          const initialLanguage = getInitialLanguage();
          applyLanguage(initialLanguage);

          if (picker) {
            picker.addEventListener("change", (event) => {
              applyLanguage(event.target.value);
            });
          }
        });
      })();
