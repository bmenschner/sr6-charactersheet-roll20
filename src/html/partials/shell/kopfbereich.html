<!-- BEGIN BLOCK: Kopfbereich -->
<section class="sr6-charactersheet-kopfbereich" aria-label="Kopfbereich">
  <!-- BEGIN BLOCK: Spalte 1 - Platzhalter für Charakterbild -->
  <div
    class="sr6-charactersheet-kopfbereich-spalte sr6-charactersheet-kopfbereich-spalte--bild">
    <h2
      class="sr6-charactersheet-kopfbereich-title"
      data-i18n="section.charakterbild">
      Charakterbild
    </h2>
    <div
      class="sr6-charactersheet-placeholder sr6-charactersheet-placeholder--bild"
      aria-hidden="true">
      Platzhalter
    </div>
  </div>
  <!-- END BLOCK: Spalte 1 - Platzhalter für Charakterbild -->

  <!-- BEGIN BLOCK: Spalte 2 - Körperlicher und geistiger Zustandsmonitor -->
  <div
    class="sr6-charactersheet-kopfbereich-spalte sr6-charactersheet-kopfbereich-spalte--zustand">
    <h2
      class="sr6-charactersheet-kopfbereich-title"
      data-i18n="section.zustandsmonitor">
      Zustandsmonitor
    </h2>
    <div class="sr6-charactersheet-zustandsmonitor-zeilen">
      <label class="sr6-charactersheet-monitor-row">
        <span
          class="sr6-charactersheet-monitor-label"
          data-i18n="field.monitor_koerperlich"
          >Körperlicher Zustand</span
        >
        <div class="sr6-charactersheet-monitor-track-wrap">
          <input type="text" name="attr_sr6_monitor_koerperlich" />
          <div
            class="sr6-charactersheet-monitor-track sr6-charactersheet-monitor-track--koerperlich">
            <span
              class="sr6-charactersheet-monitor-mod sr6-charactersheet-monitor-mod--1"
              >-3</span
            >
            <span
              class="sr6-charactersheet-monitor-mod sr6-charactersheet-monitor-mod--2"
              >-2</span
            >
            <span
              class="sr6-charactersheet-monitor-mod sr6-charactersheet-monitor-mod--3"
              >-1</span
            >
          </div>
        </div>
      </label>

      <label class="sr6-charactersheet-monitor-row">
        <span
          class="sr6-charactersheet-monitor-label"
          data-i18n="field.monitor_geistig"
          >Geistiger Zustand</span
        >
        <div class="sr6-charactersheet-monitor-track-wrap">
          <input type="text" name="attr_sr6_monitor_geistig" />
          <div
            class="sr6-charactersheet-monitor-track sr6-charactersheet-monitor-track--geistig">
            <span
              class="sr6-charactersheet-monitor-mod sr6-charactersheet-monitor-mod--1"
              >-4</span
            >
            <span
              class="sr6-charactersheet-monitor-mod sr6-charactersheet-monitor-mod--2"
              >-3</span
            >
            <span
              class="sr6-charactersheet-monitor-mod sr6-charactersheet-monitor-mod--3"
              >-2</span
            >
            <span
              class="sr6-charactersheet-monitor-mod sr6-charactersheet-monitor-mod--4"
              >-1</span
            >
          </div>
        </div>
      </label>
    </div>
  </div>
  <!-- END BLOCK: Spalte 2 - Körperlicher und geistiger Zustandsmonitor -->

  <!-- BEGIN BLOCK: Spalte 3 - Platzhalter für Edge-Token -->
  <div
    class="sr6-charactersheet-kopfbereich-spalte sr6-charactersheet-kopfbereich-spalte--edge">
    <h2
      class="sr6-charactersheet-kopfbereich-title"
      data-i18n="section.edge_token">
      Edge Token
    </h2>
    <div
      class="sr6-charactersheet-placeholder sr6-charactersheet-placeholder--edge"
      aria-hidden="true">
      Platzhalter
    </div>
  </div>
  <!-- END BLOCK: Spalte 3 - Platzhalter für Edge-Token -->
</section>
<!-- END BLOCK: Kopfbereich -->
