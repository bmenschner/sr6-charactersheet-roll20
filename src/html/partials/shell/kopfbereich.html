<!-- BEGIN BLOCK: Kopfbereich -->
<section class="sr6-charactersheet-kopfbereich" aria-label="Kopfbereich">
  <!-- BEGIN BLOCK: Spalte 1 - Platzhalter für Charakterbild -->
  <div
    class="sr6-charactersheet-kopfbereich-spalte sr6-charactersheet-kopfbereich-spalte--bild">
    <h2
      class="sr6-charactersheet-kopfbereich-title"
      data-i18n="section.charakterbild">
      Charakterbild
    </h2>
    <div
      class="sr6-charactersheet-placeholder sr6-charactersheet-placeholder--bild"
      aria-hidden="true">
      Platzhalter
    </div>
  </div>
  <!-- END BLOCK: Spalte 1 - Platzhalter für Charakterbild -->

  <!-- BEGIN BLOCK: Spalte 2 - Körperlicher und geistiger Zustandsmonitor -->

      data-i18n="section.zustandsmonitor">
      Zustandsmonitor

    <input type="hidden" name="attr_sr6_monitor_koerperlich_count" value="0" />

    <div class="sr6-charactersheet-zustandsmonitor-zeilen">
      <div class="sr6-charactersheet-monitor-row">

        >
        <div class="sr6-charactersheet-monitor-track-wrap">
          <input type="text" name="attr_sr6_monitor_koerperlich" readonly />
          <div class="sr6-charactersheet-monitor-track-shell sr6-charactersheet-monitor-track-shell--koerperlich">
            <input type="hidden" name="attr_sr6_monitor_koerperlich_max" value="0" />
            <div class="sr6-charactersheet-monitor-track sr6-charactersheet-monitor-track--koerperlich">
              <label class="sr6-charactersheet-monitor-box"><input type="checkbox" name="attr_sr6_monitor_koerperlich_1" value="1" /><span></span></label>

              <label class="sr6-charactersheet-monitor-box"><input type="checkbox" name="attr_sr6_monitor_koerperlich_8" value="1" /><span></span></label>
              <label class="sr6-charactersheet-monitor-box sr6-charactersheet-monitor-box--mod" data-mod="-3"><input type="checkbox" name="attr_sr6_monitor_koerperlich_9" value="1" /><span>-3</span></label>
              <label class="sr6-charactersheet-monitor-box"><input type="checkbox" name="attr_sr6_monitor_koerperlich_10" value="1" /><span></span></label>
              <label class="sr6-charactersheet-monitor-box"><input type="checkbox" name="attr_sr6_monitor_koerperlich_11" value="1" /><span></span></label>
              <label class="sr6-charactersheet-monitor-box sr6-charactersheet-monitor-box--mod" data-mod="-4"><input type="checkbox" name="attr_sr6_monitor_koerperlich_12" value="1" /><span>-4</span></label>

              <label class="sr6-charactersheet-monitor-box sr6-charactersheet-monitor-box--mod" data-mod="-5"><input type="checkbox" name="attr_sr6_monitor_koerperlich_15" value="1" /><span>-5</span></label>
              <label class="sr6-charactersheet-monitor-box"><input type="checkbox" name="attr_sr6_monitor_koerperlich_16" value="1" /><span></span></label>
              <label class="sr6-charactersheet-monitor-box"><input type="checkbox" name="attr_sr6_monitor_koerperlich_17" value="1" /><span></span></label>
              <label class="sr6-charactersheet-monitor-box sr6-charactersheet-monitor-box--mod" data-mod="-6"><input type="checkbox" name="attr_sr6_monitor_koerperlich_18" value="1" /><span>-6</span></label>
            </div>
            
          </div>
        </div>
      </div>

      <div class="sr6-charactersheet-monitor-row">
        <span
          class="sr6-charactersheet-monitor-label"
          data-i18n="field.monitor_geistig"
          >Geistiger Zustand</span
        >
        <div class="sr6-charactersheet-monitor-track-wrap">
          <input type="text" name="attr_sr6_monitor_geistig" readonly />
          <div class="sr6-charactersheet-monitor-track-shell sr6-charactersheet-monitor-track-shell--geistig">
            <input type="hidden" name="attr_sr6_monitor_geistig_max" value="0" />
            <div class="sr6-charactersheet-monitor-track sr6-charactersheet-monitor-track--geistig">
              <label class="sr6-charactersheet-monitor-box"><input type="checkbox" name="attr_sr6_monitor_geistig_1" value="1" /><span></span></label>
              <label class="sr6-charactersheet-monitor-box"><input type="checkbox" name="attr_sr6_monitor_geistig_2" value="1" /><span></span></label>
              <label class="sr6-charactersheet-monitor-box sr6-charactersheet-monitor-box--mod" data-mod="-1"><input type="checkbox" name="attr_sr6_monitor_geistig_3" value="1" /><span>-1</span></label>
              <label class="sr6-charactersheet-monitor-box"><input type="checkbox" name="attr_sr6_monitor_geistig_4" value="1" /><span></span></label>
              <label class="sr6-charactersheet-monitor-box"><input type="checkbox" name="attr_sr6_monitor_geistig_5" value="1" /><span></span></label>
              <label class="sr6-charactersheet-monitor-box sr6-charactersheet-monitor-box--mod" data-mod="-2"><input type="checkbox" name="attr_sr6_monitor_geistig_6" value="1" /><span>-2</span></label>
              <label class="sr6-charactersheet-monitor-box"><input type="checkbox" name="attr_sr6_monitor_geistig_7" value="1" /><span></span></label>
              <label class="sr6-charactersheet-monitor-box"><input type="checkbox" name="attr_sr6_monitor_geistig_8" value="1" /><span></span></label>

              <label class="sr6-charactersheet-monitor-box sr6-charactersheet-monitor-box--mod" data-mod="-4"><input type="checkbox" name="attr_sr6_monitor_geistig_12" value="1" /><span>-4</span></label>
              <label class="sr6-charactersheet-monitor-box"><input type="checkbox" name="attr_sr6_monitor_geistig_13" value="1" /><span></span></label>
              <label class="sr6-charactersheet-monitor-box"><input type="checkbox" name="attr_sr6_monitor_geistig_14" value="1" /><span></span></label>
              <label class="sr6-charactersheet-monitor-box sr6-charactersheet-monitor-box--mod" data-mod="-5"><input type="checkbox" name="attr_sr6_monitor_geistig_15" value="1" /><span>-5</span></label>
              <label class="sr6-charactersheet-monitor-box"><input type="checkbox" name="attr_sr6_monitor_geistig_16" value="1" /><span></span></label>
              <label class="sr6-charactersheet-monitor-box"><input type="checkbox" name="attr_sr6_monitor_geistig_17" value="1" /><span></span></label>

            </div>
            
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- END BLOCK: Spalte 2 - Körperlicher und geistiger Zustandsmonitor -->

  <!-- BEGIN BLOCK: Spalte 3 - Platzhalter für Edge-Token -->
  <div
    class="sr6-charactersheet-kopfbereich-spalte sr6-charactersheet-kopfbereich-spalte--edge">
    <h2
      class="sr6-charactersheet-kopfbereich-title"
      data-i18n="section.edge_token">
      Edge Token
    </h2>
    <div
      class="sr6-charactersheet-placeholder sr6-charactersheet-placeholder--edge"
      aria-label="Edge Token">
      <button
        type="button"
        class="sr6-edge-coin"
        aria-label="Edge Coin">
        <input
          type="text"
          class="sr6-edge-coin-value"
          name="attr_sr6_edge_aktuell"
          value="0"
          inputmode="numeric" />
      </button>
    </div>
  </div>
  <!-- END BLOCK: Spalte 3 - Platzhalter für Edge-Token -->
</section>
<!-- END BLOCK: Kopfbereich -->
