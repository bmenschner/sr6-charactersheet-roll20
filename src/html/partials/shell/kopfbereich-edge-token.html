<!-- BEGIN BLOCK: Spalte 3 - Edge Token -->
<div
  class="sr6-charactersheet-kopfbereich-spalte sr6-charactersheet-kopfbereich-spalte--edge">
  <h2
    class="sr6-charactersheet-kopfbereich-title"
    data-i18n="section.edge_token">
    Edge Token
  </h2>
  <div class="sr6-charactersheet-edge-token" aria-label="Edge Token">
    <div class="sr6-edge-coin" aria-label="Edge Coin">
      <button
        type="action"
        name="act_sr6_edge_token_minus"
        class="sr6-edge-coin-hit sr6-edge-coin-hit--minus"
        aria-label="Edge verringern"></button>
      <button
        type="action"
        name="act_sr6_edge_token_plus"
        class="sr6-edge-coin-hit sr6-edge-coin-hit--plus"
        aria-label="Edge erhoehen"></button>
      <span class="sr6-edge-coin-sign sr6-edge-coin-sign--minus">-</span>
      <input
        type="text"
        class="sr6-edge-coin-value"
        name="attr_sr6_edge_aktuell"
        value="0"
        inputmode="numeric" />
      <span class="sr6-edge-coin-sign sr6-edge-coin-sign--plus">+</span>
    </div>
  </div>
</div>
<!-- END BLOCK: Spalte 3 - Edge Token -->
