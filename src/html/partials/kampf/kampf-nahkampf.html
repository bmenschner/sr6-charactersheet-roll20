<!-- BEGIN BLOCK: Kampf Nahkampf und Abwehr -->

              <section
                class="sr6-charactersheet-box sr6-charactersheet-box-kampf-nahkampf"
                aria-labelledby="kampf-nahkampf-titel">
                <h2
                  id="kampf-nahkampf-titel"
                  class="sr6-charactersheet-box-title"
                  data-i18n="section.kampf_nahkampf">
                  Kampf: Nahkampf & Abwehr
                </h2>

                <div class="sr6-charactersheet-box-content">
                  <!-- BEGIN BLOCK: Primäre Nahkampfwaffe mit Rollbutton -->
                  <div class="sr6-charactersheet-row sr6-charactersheet-row-1">
                    <label class="sr6-charactersheet-field">
                      <span data-i18n="field.primaere_nahkampfwaffe"
                        >Primäre Nahkampfwaffe</span
                      >
                      <div class="sr6-charactersheet-field-input-with-dice">
                        <input
                          type="text"
                          name="attr_sr6_combat_primaere_nahkampfwaffe" /><button
                          type="roll"
                          class="sr6-charactersheet-field-dice-button"
                          name="roll_sr6_tab_kampf_primaere_nahkampfwaffe"
                          value="&{template:default} {{name=Nahkampf-Test}} {{Waffe=@{sr6_combat_primaere_nahkampfwaffe}}} {{Attribut=Primaere Nahkampfwaffe}} {{Pool=[[@{sr6_combat_primaere_nahkampfwaffe}]]}} {{Erfolge=[[@{sr6_combat_primaere_nahkampfwaffe}d6cs>4]]}}"
                          aria-label="Wuerfeln"></button>
                      </div>
                    </label>
                  </div>
                  <!-- END BLOCK: Primäre Nahkampfwaffe mit Rollbutton -->

                  <!-- BEGIN BLOCK: Primäre Panzerung -->
                  <div class="sr6-charactersheet-row sr6-charactersheet-row-1">
                    <label class="sr6-charactersheet-field">
                      <span data-i18n="field.primaere_panzerung"
                        >Primäre Panzerung</span
                      >
                      <input
                        type="text"
                        name="attr_sr6_combat_primaere_panzerung" />
                    </label>
                  </div>
                  <!-- END BLOCK: Primäre Panzerung -->

                  <!-- BEGIN BLOCK: Abgeleitete, read-only Kampf-Basiswerte -->
                  <div class="sr6-charactersheet-row sr6-charactersheet-row-2">
                    <label class="sr6-charactersheet-field">
                      <span data-i18n="field.initiative_basis"
                        >Initiative (Basis)</span
                      >
                      <input
                        type="text"
                        name="attr_sr6_derived_initiative_basis"
                        readonly />
                    </label>

                    <label class="sr6-charactersheet-field">
                      <span data-i18n="field.verteidigung_basis"
                        >Verteidigung (Basis)</span
                      >
                      <input
                        type="text"
                        name="attr_sr6_derived_verteidigung_basis"
                        readonly />
                    </label>
                  </div>
                  <!-- END BLOCK: Abgeleitete, read-only Kampf-Basiswerte -->
                </div>
              </section>
<!-- END BLOCK: Kampf Nahkampf und Abwehr -->
