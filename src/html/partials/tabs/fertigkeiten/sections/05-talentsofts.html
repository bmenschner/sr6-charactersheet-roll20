<!-- BEGIN BLOCK: Talentsofts -->
<section
  class="sr6-charactersheet-box sr6-fertigkeiten-extra-section sr6-talentsofts-section sr6-editable-section"
  aria-labelledby="fertigkeiten-talentsofts-titel">
  <div class="sr6-editable-section-title-row">
    <h2
      id="fertigkeiten-talentsofts-titel"
      class="sr6-charactersheet-box-title"
      data-i18n="section.talentsofts">
      Talentsofts
    </h2>
    <label class="sr6-editable-section-toggle">
      <input
        type="checkbox"
        name="attr_sr6_talentsofts_edit_mode"
        class="sr6-editable-section-mode"
                      />
                    <span data-i18n="field.editieren">Editieren</span>
    </label>
  </div>
  <div class="sr6-charactersheet-box-content">
    <div class="sr6-generic-list-header sr6-generic-list-header--5">
      <span data-i18n="field.name">Name</span>
      <span data-i18n="field.attribut">Attribut</span>
      <span data-i18n="field.stufe">Stufe</span>
      <span data-i18n="field.modifikator">Modifikator</span>
      <div class="sr6-field-label-with-info"><span data-i18n="field.gesamtwert">Gesamtwert</span><span class="sr6-info-icon" title="Gesamtwert = gewähltes Attribut + Stufe + Modifikator">i</span></div>
    </div>
    <fieldset class="repeating_sr6talentsofts">
      <div class="sr6-foundry-item">
        <div class="sr6-editable-item-fields">
          <div class="sr6-foundry-item-head sr6-charactersheet-row sr6-charactersheet-row-5">
            <div class="sr6-charactersheet-field">
              <span data-i18n="field.name">Name</span>
              <input type="text" name="attr_sr6_talentsoft_name" />
            </div>
            <div class="sr6-charactersheet-field">
              <span data-i18n="field.attribut">Attribut</span>
              <select name="attr_sr6_talentsoft_attribut">
                <option value="Geschicklichkeit" data-i18n="field.geschicklichkeit" selected>Geschicklichkeit</option>
                <option value="Konstitution" data-i18n="field.konstitution">Konstitution</option>
                <option value="Reaktion" data-i18n="field.reaktion">Reaktion</option>
                <option value="Stärke" data-i18n="field.staerke">Stärke</option>
                <option value="Willenskraft" data-i18n="field.willenskraft">Willenskraft</option>
                <option value="Logik" data-i18n="field.logik">Logik</option>
                <option value="Intuition" data-i18n="field.intuition">Intuition</option>
                <option value="Charisma" data-i18n="field.charisma">Charisma</option>
                <option value="Magie/Resonanz" data-i18n="field.magie_resonanz">Magie/Resonanz</option>
              </select>
            </div>
            <div class="sr6-charactersheet-field">
              <span data-i18n="field.stufe">Stufe</span>
              <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_talentsoft_grundwert::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_talentsoft_grundwert" /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_talentsoft_grundwert::1" aria-label="Erhoehen">+</button></div>
            </div>
            <div class="sr6-charactersheet-field">
              <span data-i18n="field.modifikator">Modifikator</span>
              <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_talentsoft_modifikator::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_talentsoft_modifikator" /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_talentsoft_modifikator::1" aria-label="Erhoehen">+</button></div>
            </div>
            <div class="sr6-charactersheet-field">
              <div class="sr6-field-label-with-info"><span data-i18n="field.gesamtwert">Gesamtwert</span><span class="sr6-info-icon" title="Gesamtwert = gewähltes Attribut + Stufe + Modifikator">i</span></div>
              <div class="sr6-charactersheet-field-input-with-dice">
                <input type="number" name="attr_sr6_talentsoft_gesamtwert" readonly /><button
                  type="action"
                  class="sr6-charactersheet-field-dice-button"
                  name="act_probe"
                  value="&{template:default} {{name=Talentsoft}} {{Fertigkeit=@{sr6_talentsoft_name}}} {{Attribut=@{sr6_talentsoft_attribut}}} {{Stufe=@{sr6_talentsoft_grundwert}}} {{Modifikator=@{sr6_talentsoft_modifikator}}} {{Hinweis=Keine Edge-Verbesserung mit Talentsoft}} {{Pool=[[@{sr6_talentsoft_gesamtwert}]]}} {{Erfolge=[[@{sr6_talentsoft_gesamtwert}d6>5]]}}"
                  aria-label="Wuerfeln"></button>
              </div>
            </div>
          </div>
          <div class="sr6-foundry-item-footer sr6-charactersheet-row sr6-charactersheet-row-1 sr6-repeater-notes-mod-row">
            <div class="sr6-charactersheet-field sr6-charactersheet-mod-popup sr6-repeater-notes-mod-field">
              <details>
                <summary data-i18n="field.notizen_zubehoer_modifikationen">Notizen, Zubehör, Modifikationen</summary>
                <div class="sr6-charactersheet-mod-popup-panel">
                  <span data-i18n="field.notizen_zubehoer_modifikationen">Notizen, Zubehör, Modifikationen</span>
                  <textarea name="attr_sr6_item_notizen_zubehoer_modifikationen" rows="4"></textarea>
                </div>
              </details>
            </div>
          </div>
        </div>
      </div>
    </fieldset>
  </div>
</section>
<!-- END BLOCK: Talentsofts -->
