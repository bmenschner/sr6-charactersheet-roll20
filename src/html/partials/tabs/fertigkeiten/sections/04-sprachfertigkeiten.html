<!-- BEGIN BLOCK: Sprachfertigkeiten -->
<section
  class="sr6-charactersheet-box sr6-fertigkeiten-extra-section sr6-sprachfertigkeiten-section sr6-editable-section"
  aria-labelledby="fertigkeiten-sprachfertigkeiten-titel">
  <div class="sr6-editable-section-title-row">
    <h2
      id="fertigkeiten-sprachfertigkeiten-titel"
      class="sr6-charactersheet-box-title"
      data-i18n="section.sprachfertigkeiten">
      Sprachfertigkeiten
    </h2>
    <label class="sr6-editable-section-toggle">
      <input
        type="checkbox"
        name="attr_sr6_sprachfertigkeiten_edit_mode"
        class="sr6-editable-section-mode"
                      />
                    <span data-i18n="field.editieren">Editieren</span>
    </label>
  </div>
  <div class="sr6-charactersheet-box-content">
    <div class="sr6-generic-list-header sr6-generic-list-header--memory-probe sr6-generic-list-header--language-probe">
      <span data-i18n="field.name">Name</span>
      <span data-i18n="field.niveau">Niveau</span>
      <div class="sr6-field-label-with-info"><span data-i18n="field.pool">Pool</span><span class="sr6-info-icon" title="Pool = Erinnerungsvermögen (Logik + Intuition) + Sprachbonus">i</span></div>
    </div>
    <fieldset class="repeating_sr6sprachfertigkeiten">
      <div class="sr6-foundry-item">
        <div class="sr6-editable-item-fields">
          <div class="sr6-foundry-item-head sr6-charactersheet-row sr6-fertigkeiten-memory-probe-row">
            <div class="sr6-charactersheet-field">
              <span data-i18n="field.name">Name</span>
              <input type="text" name="attr_sr6_sprachfertigkeit_name" />
            </div>
            <div class="sr6-charactersheet-field">
              <span data-i18n="field.niveau">Niveau</span>
              <select name="attr_sr6_sprachfertigkeit_niveau">
                <option value="Erlernt" data-i18n="field.sprach_niveau_erlernt">Erlernt</option>
                <option value="Fortgeschritten (+2)" data-i18n="field.sprach_niveau_fortgeschritten">Fortgeschritten (+2)</option>
                <option value="Experte (+3)" data-i18n="field.sprach_niveau_experte">Experte (+3)</option>
                <option value="Muttersprache" data-i18n="field.sprach_niveau_muttersprache">Muttersprache</option>
              </select>
            </div>
            <div class="sr6-charactersheet-field">
              <div class="sr6-field-label-with-info"><span data-i18n="field.pool">Pool</span><span class="sr6-info-icon" title="Pool = Erinnerungsvermögen (Logik + Intuition) + Sprachbonus">i</span></div>
              <div class="sr6-charactersheet-field-input-with-dice">
                <input type="number" name="attr_sr6_sprachfertigkeit_gesamtwert" readonly /><button
                  type="action"
                  class="sr6-charactersheet-field-dice-button"
                  name="act_probe"
                  value="&{template:default} {{name=Erinnerungsvermögen}} {{Fertigkeit=@{sr6_sprachfertigkeit_name}}} {{Sprachniveau=@{sr6_sprachfertigkeit_niveau}}} {{Sprachbonus=[[@{sr6_sprachfertigkeit_bonus}]]}} {{Hinweis=@{sr6_sprachfertigkeit_hinweis}}} {{Attributsprobe=Erinnerungsvermögen}} {{Formel=Logik + Intuition}} {{Notiz=@{sr6_item_notizen_zubehoer_modifikationen}}} {{Pool=[[@{sr6_sprachfertigkeit_gesamtwert}]]}} {{Erfolge=[[@{sr6_sprachfertigkeit_gesamtwert}d6>5]]}}"
                  aria-label="Wuerfeln"></button>
                <input type="hidden" name="attr_sr6_sprachfertigkeit_bonus" value="0" />
                <input type="hidden" name="attr_sr6_sprachfertigkeit_hinweis" value="" />
              </div>
            </div>
          </div>
          <div class="sr6-foundry-item-footer sr6-charactersheet-row sr6-charactersheet-row-1 sr6-repeater-notes-mod-row">
            <div class="sr6-charactersheet-field sr6-charactersheet-mod-popup sr6-repeater-notes-mod-field">
              <details>
                <summary data-i18n="field.notizen_zubehoer_modifikationen">Notizen, Zubehör, Modifikationen</summary>
                <div class="sr6-charactersheet-mod-popup-panel">
                  <span data-i18n="field.notizen_zubehoer_modifikationen">Notizen, Zubehör, Modifikationen</span>
                  <textarea name="attr_sr6_item_notizen_zubehoer_modifikationen" rows="4"></textarea>
                </div>
              </details>
            </div>
          </div>
        </div>
      </div>
    </fieldset>
  </div>
</section>
<!-- END BLOCK: Sprachfertigkeiten -->
