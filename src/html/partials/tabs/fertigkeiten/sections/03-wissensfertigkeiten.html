<!-- BEGIN BLOCK: Wissensfertigkeiten -->
<section
  class="sr6-charactersheet-box sr6-fertigkeiten-extra-section sr6-wissensfertigkeiten-section sr6-editable-section"
  aria-labelledby="fertigkeiten-wissensfertigkeiten-titel">
  <div class="sr6-editable-section-title-row">
    <h2
      id="fertigkeiten-wissensfertigkeiten-titel"
      class="sr6-charactersheet-box-title"
      data-i18n="section.wissensfertigkeiten">
      Wissensfertigkeiten
    </h2>
    <label class="sr6-editable-section-toggle">
      <input
        type="checkbox"
        name="attr_sr6_wissensfertigkeiten_edit_mode"
        class="sr6-editable-section-mode"
                      />
                    <span data-i18n="field.editieren">Editieren</span>
    </label>
  </div>
  <div class="sr6-charactersheet-box-content">
    <div class="sr6-generic-list-header sr6-generic-list-header--memory-probe">
      <span data-i18n="field.name">Name</span>
      <div class="sr6-field-label-with-info"><span data-i18n="field.pool">Pool</span><span class="sr6-info-icon" title="Pool = Erinnerungsvermögen (Logik + Intuition)">i</span></div>
    </div>
    <fieldset class="repeating_sr6wissensfertigkeiten">
      <div class="sr6-foundry-item">
        <div class="sr6-editable-item-fields">
          <div class="sr6-foundry-item-head sr6-charactersheet-row sr6-fertigkeiten-memory-probe-row">
            <div class="sr6-charactersheet-field">
              <span data-i18n="field.name">Name</span>
              <input type="text" name="attr_sr6_wissensfertigkeit_name" />
            </div>
            <div class="sr6-charactersheet-field">
              <div class="sr6-field-label-with-info"><span data-i18n="field.pool">Pool</span><span class="sr6-info-icon" title="Pool = Erinnerungsvermögen (Logik + Intuition)">i</span></div>
              <div class="sr6-charactersheet-field-input-with-dice">
                <input type="number" name="attr_sr6_wissensfertigkeit_gesamtwert" readonly /><button
                  type="action"
                  class="sr6-charactersheet-field-dice-button"
                  name="act_probe"
                  value="&{template:default} {{name=Erinnerungsvermögen}} {{Fertigkeit=@{sr6_wissensfertigkeit_name}}} {{Attributsprobe=Erinnerungsvermögen}} {{Formel=Logik + Intuition}} {{Pool=[[@{sr6_attrprobe_erinnerungsvermoegen}]]}} {{Erfolge=[[@{sr6_attrprobe_erinnerungsvermoegen}d6>5]]}}"
                  aria-label="Wuerfeln"></button>
              </div>
            </div>
          </div>
          <div class="sr6-foundry-item-footer sr6-charactersheet-row sr6-charactersheet-row-1 sr6-repeater-notes-mod-row">
            <div class="sr6-charactersheet-field sr6-charactersheet-mod-popup sr6-repeater-notes-mod-field">
              <details>
                <summary data-i18n="field.notizen_zubehoer_modifikationen">Notizen, Zubehör, Modifikationen</summary>
                <div class="sr6-charactersheet-mod-popup-panel">
                  <span data-i18n="field.notizen_zubehoer_modifikationen">Notizen, Zubehör, Modifikationen</span>
                  <textarea name="attr_sr6_item_notizen_zubehoer_modifikationen" rows="4"></textarea>
                </div>
              </details>
            </div>
          </div>
        </div>
      </div>
    </fieldset>
  </div>
</section>
<!-- END BLOCK: Wissensfertigkeiten -->
