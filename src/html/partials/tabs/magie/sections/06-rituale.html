  <!-- BEGIN BLOCK: Magie Rituale -->
  <section class="sr6-charactersheet-box sr6-editable-section sr6-rituale-section" aria-labelledby="magie-rituale-titel">
      <div class="sr6-editable-section-title-row">
      <h2
        id="magie-rituale-titel"
        class="sr6-charactersheet-box-title"
        data-i18n="section.magie_rituale">
        Rituale
      </h2>
      <label class="sr6-editable-section-toggle">
        <input
          type="checkbox"
          name="attr_sr6_magic_rituale_edit_mode"
          class="sr6-editable-section-mode"
                      />
                    <span data-i18n="field.editieren">Editieren</span>
      </label>
      </div>
      <div class="sr6-charactersheet-box-content">
        <div class="sr6-generic-list-header sr6-generic-list-header--5" aria-hidden="true">
          <span data-i18n="field.ritual_name">Ritualname</span>
          <span data-i18n="field.ritual_schwelle">Schwelle</span>
          <span data-i18n="field.dauer">Dauer</span>
          <span data-i18n="field.notiz">Notiz</span>
          <span data-i18n="field.wurf">Wurf</span>
        </div>
        <fieldset class="repeating_sr6rituale">
          <div class="sr6-foundry-item">
            <div class="sr6-editable-item-fields">
            <div class="sr6-foundry-item-head sr6-charactersheet-row sr6-charactersheet-row-3">
              <div class="sr6-charactersheet-field">
                <span data-i18n="field.ritual_name">Ritualname</span>
                <input type="text" name="attr_sr6_ritual_name" />
              </div>
              <div class="sr6-charactersheet-field">
                <span data-i18n="field.ritual_schwelle">Schwelle</span>
                <input type="text" name="attr_sr6_ritual_schwelle" />
              </div>
              <div class="sr6-charactersheet-field">
                <span data-i18n="field.dauer">Dauer</span>
                <input type="text" name="attr_sr6_ritual_dauer" />
              </div>
            </div>
            <div class="sr6-foundry-item-footer sr6-charactersheet-row sr6-charactersheet-row-2">
              <div class="sr6-charactersheet-field">
                <span data-i18n="field.notiz">Notiz</span>
                <input type="text" name="attr_sr6_ritual_notiz" />
              </div>
              <div class="sr6-charactersheet-field">
                <span data-i18n="field.wurf">Wurf</span>
                <div class="sr6-charactersheet-field-input-with-dice">
                  <input type="text" name="attr_sr6_ritual_wurfpool" /><button
                    type="roll"
                    class="sr6-charactersheet-field-dice-button"
                    name="roll_sr6_ritual_probe"
                    value="&{template:default} {{name=Ritualprobe}} {{Ritual=@{sr6_ritual_name}}} {{Pool=[[@{sr6_ritual_wurfpool}]]}} {{Erfolge=[[@{sr6_ritual_wurfpool}d6cs>5]]}} {{Schwelle=@{sr6_ritual_schwelle}}}"
                    aria-label="Wuerfeln"></button>
                </div>
              </div>
            </div>
            </div>
          </div>
        </fieldset>
      </div>
  </section>
  <!-- END BLOCK: Magie Rituale -->
