<!-- Block: Rigging Kernwerte -->
            <section
              class="sr6-charactersheet-box"
              aria-labelledby="rigging-kern-titel">
              <h2
                id="rigging-kern-titel"
                class="sr6-charactersheet-box-title"
                data-i18n="section.rigging_kern">
                Rigging: Kernwerte
              </h2>

              <div class="sr6-charactersheet-box-content">
                <div class="sr6-charactersheet-row sr6-charactersheet-row-2">
                  <label class="sr6-charactersheet-field">
                    <span data-i18n="field.fahrzeug_drohne"
                      >Fahrzeug/Drohne</span
                    >
                    <input
                      type="text"
                      name="attr_sr6_rigging_fahrzeug_drohne" />
                  </label>

                  <label class="sr6-charactersheet-field">
                    <span data-i18n="field.sensorik">Sensorik</span>
                    <input type="text" name="attr_sr6_rigging_sensorik" />
                  </label>
                </div>

                <div class="sr6-charactersheet-row sr6-charactersheet-row-2">
                  <label class="sr6-charactersheet-field">
                    <span data-i18n="field.steuerungspool">Steuerungspool</span>
                    <div class="sr6-charactersheet-field-input-with-dice">
                      <input
                        type="text"
                        name="attr_sr6_rigging_steuerungspool" /><button
                        type="roll"
                        class="sr6-charactersheet-field-dice-button"
                        name="roll_sr6_tab_rigging_steuerungspool"
                        value="&{template:default} {{name=Rigging-Test}} {{Pool=[[@{sr6_rigging_steuerungspool}]]}} {{Erfolge=[[@{sr6_rigging_steuerungspool}d6cs>4]]}}"
                        aria-label="Wuerfeln"></button>
                    </div>
                  </label>

                  <label class="sr6-charactersheet-field">
                    <span data-i18n="field.fernsteuerungspool"
                      >Fernsteuerungspool</span
                    >
                    <div class="sr6-charactersheet-field-input-with-dice">
                      <input
                        type="text"
                        name="attr_sr6_rigging_fernsteuerungspool" /><button
                        type="roll"
                        class="sr6-charactersheet-field-dice-button"
                        name="roll_sr6_tab_rigging_fernsteuerungspool"
                        value="&{template:default} {{name=Fernsteuerung-Test}} {{Pool=[[@{sr6_rigging_fernsteuerungspool}]]}} {{Erfolge=[[@{sr6_rigging_fernsteuerungspool}d6cs>4]]}}"
                        aria-label="Wuerfeln"></button>
                    </div>
                  </label>
                </div>
              </div>
            </section>
<!-- End Block: Rigging Kernwerte -->
