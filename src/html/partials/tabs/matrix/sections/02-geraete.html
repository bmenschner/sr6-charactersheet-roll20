  <!-- BEGIN BLOCK: Matrix Geraete -->
  <section
    class="sr6-charactersheet-box sr6-charactersheet-tab-matrix-item--full sr6-editable-section sr6-matrix-geraete-section"
    aria-labelledby="matrix-geraete-titel">
    <div class="sr6-editable-section-title-row">
      <h2
        id="matrix-geraete-titel"
        class="sr6-charactersheet-box-title"
        data-i18n="section.matrix_geraete">
        Geräte
      </h2>
      <label class="sr6-editable-section-toggle">
        <input
          type="checkbox"
          name="attr_sr6_matrix_geraete_edit_mode"
          class="sr6-editable-section-mode" />
        <span data-i18n="field.editieren">Editieren</span>
      </label>
    </div>
    <div class="sr6-charactersheet-box-content">
      <div class="sr6-generic-list-header sr6-generic-list-header--6" aria-hidden="true">
        <span data-i18n="field.name">Name</span>
        <span data-i18n="field.typ">Typ</span>
        <span data-i18n="field.matrix_angriff">Angriff</span>
        <span data-i18n="field.matrix_schleicher">Schleicher</span>
        <span data-i18n="field.matrix_datenverarbeitung">Datenverarbeitung</span>
        <span data-i18n="field.matrix_firewall">Firewall</span>
      </div>
      <fieldset class="repeating_sr6matrixgeraete">
        <div class="sr6-foundry-item">
          <div class="sr6-editable-item-fields">
            <div class="sr6-foundry-item-head sr6-charactersheet-row sr6-charactersheet-row-6 sr6-matrix-geraet-main-row">
              <div class="sr6-charactersheet-field">
                <span data-i18n="field.name">Name</span>
                <input type="text" name="attr_sr6_matrix_geraet_name" />
              </div>
              <div class="sr6-charactersheet-field">
                <span data-i18n="field.typ">Typ</span>
                <select name="attr_sr6_matrix_geraet_typ">
                  <option value="Cyberdeck" data-i18n="field.matrix_geraet_typ_cyberdeck">Cyberdeck</option>
                  <option value="Kommlink" data-i18n="field.matrix_geraet_typ_kommlink">Kommlink</option>
                  <option value="Riggerkonsole" data-i18n="field.matrix_geraet_typ_riggerkonsole">Riggerkonsole</option>
                  <option value="Host" data-i18n="field.matrix_geraet_typ_host">Host</option>
                </select>
              </div>
              <div class="sr6-charactersheet-field">
                <span data-i18n="field.matrix_angriff">Angriff</span>
                <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_matrix_geraet_angriff::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_matrix_geraet_angriff" /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_matrix_geraet_angriff::1" aria-label="Erhoehen">+</button></div>
              </div>
              <div class="sr6-charactersheet-field">
                <span data-i18n="field.matrix_schleicher">Schleicher</span>
                <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_matrix_geraet_schleicher::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_matrix_geraet_schleicher" /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_matrix_geraet_schleicher::1" aria-label="Erhoehen">+</button></div>
              </div>
              <div class="sr6-charactersheet-field">
                <span data-i18n="field.matrix_datenverarbeitung">Datenverarbeitung</span>
                <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_matrix_geraet_datenverarbeitung::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_matrix_geraet_datenverarbeitung" /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_matrix_geraet_datenverarbeitung::1" aria-label="Erhoehen">+</button></div>
              </div>
              <div class="sr6-charactersheet-field">
                <span data-i18n="field.matrix_firewall">Firewall</span>
                <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_matrix_geraet_firewall::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_matrix_geraet_firewall" /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_matrix_geraet_firewall::1" aria-label="Erhoehen">+</button></div>
              </div>
            </div>
            <div class="sr6-foundry-item-footer sr6-matrix-geraet-programme-row">
              <div class="sr6-charactersheet-field sr6-matrix-geraet-programme-field">
                <span data-i18n="field.programme_zubehoer">Programme/Zubehör</span>
                <input type="text" name="attr_sr6_matrix_geraet_programme" />
              </div>
            </div>
            <div class="sr6-foundry-item-footer sr6-charactersheet-row sr6-charactersheet-row-1 sr6-repeater-notes-mod-row">
              <div class="sr6-charactersheet-field sr6-charactersheet-mod-popup sr6-repeater-notes-mod-field">
                <details>
                  <summary data-i18n="field.notizen_zubehoer_modifikationen">Notizen, Zubehör, Modifikationen</summary>
                  <div class="sr6-charactersheet-mod-popup-panel">
                    <span data-i18n="field.notizen_zubehoer_modifikationen">Notizen, Zubehör, Modifikationen</span>
                    <textarea name="attr_sr6_item_notizen_zubehoer_modifikationen" rows="4"></textarea>
                  </div>
                </details>
              </div>
            </div>
          </div>
        </div>
      </fieldset>
    </div>
  </section>
  <!-- END BLOCK: Matrix Geraete -->
