  <!-- BEGIN BLOCK: Matrix Kernwerte -->
  <section
    class="sr6-charactersheet-box sr6-charactersheet-tab-matrix-item--full"
    aria-labelledby="matrix-kern-titel">
    <h2
      id="matrix-kern-titel"
      class="sr6-charactersheet-box-title"
      data-i18n="section.matrix_kern">
      Matrix: Kernwerte
    </h2>

    <div class="sr6-charactersheet-box-content">
      <div class="sr6-charactersheet-row sr6-charactersheet-row-4">
        <div class="sr6-charactersheet-field">
          <span data-i18n="field.cyberdeck_persona">Cyberdeck/Persona</span>
          <input type="text" name="attr_sr6_matrix_cyberdeck_persona" />
        </div>

        <div class="sr6-charactersheet-field">
          <span data-i18n="field.modus">Modus</span>
          <select name="attr_sr6_matrix_modus">
            <option value="AR" data-i18n="field.rigging_modus_ar">AR</option>
            <option value="VR Kalt" data-i18n="field.rigging_modus_vr_kalt">VR - Kalt</option>
            <option value="VR Heiss" data-i18n="field.rigging_modus_vr_heiss">VR - Heiß</option>
          </select>
        </div>

        <div class="sr6-charactersheet-field">
          <span data-i18n="field.matrix_initiative">Matrix-Initiative</span>
          <div class="sr6-charactersheet-field-input-with-dice">
            <input type="text" name="attr_sr6_matrix_initiative" /><button
              type="action"
              class="sr6-charactersheet-field-dice-button"
              name="act_probe"
              value="&{template:default} {{name=Matrix-Initiative}} {{Basis=[[@{sr6_matrix_initiative}]]}} {{Gesamt=[[@{sr6_matrix_initiative}+3d6]]}}"
              aria-label="Wuerfeln"></button>
          </div>
        </div>

        <div class="sr6-charactersheet-field">
          <span data-i18n="field.overwatch">Overwatch</span>
          <div class="sr6-charactersheet-field-input-with-dice">
            <input type="text" name="attr_sr6_matrix_overwatch" /><button
              type="action"
              class="sr6-charactersheet-field-dice-button"
              name="act_probe"
              value="&{template:default} {{name=Matrix-Kernwert}} {{Wert=Overwatch}} {{Pool=[[@{sr6_matrix_overwatch}]]}} {{Erfolge=[[@{sr6_matrix_overwatch}d6>5]]}}"
              aria-label="Wuerfeln"></button>
          </div>
        </div>
      </div>

      <div class="sr6-charactersheet-row sr6-charactersheet-row-4">
        <div class="sr6-charactersheet-field">
          <span data-i18n="field.matrix_angriff">Angriff</span>

          </div>

  </section>
