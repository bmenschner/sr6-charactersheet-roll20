<!-- BEGIN BLOCK: Initiative -->
<section
  class="sr6-charactersheet-box sr6-charactersheet-box-initiative sr6-editable-section sr6-editable-overview-section"
  aria-labelledby="initiative-titel">
  <div class="sr6-editable-section-title-row">
    <h1
      id="initiative-titel"
      class="sr6-charactersheet-box-title"
      data-i18n="section.initiative">
      Initiative
    </h1>
    <label class="sr6-editable-section-toggle">
      <input
        type="checkbox"
        name="attr_sr6_allgemein_initiative_edit_mode"
        class="sr6-editable-section-mode"
                      />
                    <span data-i18n="field.editieren">Editieren</span>
    </label>
  </div>

  <div class="sr6-charactersheet-box-content">
    <!-- BEGIN BLOCK: Zeile - Physische Initiative -->
    <div class="sr6-charactersheet-init-row">
      <span
        class="sr6-charactersheet-init-row-title"
        data-i18n="field.physisch"
        >Physisch</span
      >
      <div class="sr6-charactersheet-init-formula">
        <span data-i18n="field.basis">Basis</span>
        <input
          type="number"
          name="attr_sr6_derived_initiative_basis"
          readonly />
      </div>
      <div class="sr6-charactersheet-init-formula-with-dice">
        <span data-i18n="field.w6">W6</span>
        <div class="sr6-charactersheet-field-input-with-dice">
          <input
            type="number"
            name="attr_sr6_initiative_physisch_w6"
            value="1" /><button
            type="action"
            class="sr6-charactersheet-field-dice-button"
            name="act_probe"
            value="&{template:default} {{name=Initiative: Physisch}} {{Basis=[[@{sr6_derived_initiative_basis}]]}} {{W6=[[@{sr6_initiative_physisch_w6}d6]]}} {{Gesamt=[[@{sr6_derived_initiative_basis}+(@{sr6_initiative_physisch_w6}d6)]]}}"
            aria-label="Wuerfeln"></button>
        </div>
      </div>
    </div>
    <!-- END BLOCK: Zeile - Physische Initiative -->

    <!-- BEGIN BLOCK: Zeile - Astrale Initiative -->
    <div class="sr6-charactersheet-init-row">
      <span
        class="sr6-charactersheet-init-row-title"
        data-i18n="field.astral"
        >Astral</span
      >
      <div class="sr6-charactersheet-init-formula">
        <span data-i18n="field.basis">Basis</span>
        <input
          type="number"
          name="attr_sr6_magic_astrale_initiative"
          readonly />
      </div>
      <div class="sr6-charactersheet-init-formula-with-dice">
        <span data-i18n="field.w6">W6</span>
        <div class="sr6-charactersheet-field-input-with-dice">
          <input
            type="number"
            name="attr_sr6_magic_astrale_initiative_w6"
            value="3" /><button
            type="action"
            class="sr6-charactersheet-field-dice-button"
            name="act_probe"
            value="&{template:default} {{name=Initiative: Astral}} {{Basis=[[@{sr6_magic_astrale_initiative}]]}} {{W6=[[@{sr6_magic_astrale_initiative_w6}d6]]}} {{Gesamt=[[@{sr6_magic_astrale_initiative}+(@{sr6_magic_astrale_initiative_w6}d6)]]}}"
            aria-label="Wuerfeln"></button>
        </div>
      </div>
    </div>
    <!-- END BLOCK: Zeile - Astrale Initiative -->

    <!-- BEGIN BLOCK: Zeile - Matrix-Initiative -->
    <div class="sr6-charactersheet-init-row">
      <span
        class="sr6-charactersheet-init-row-title"
        data-i18n="field.matrix"
        >Matrix</span
      >
      <div class="sr6-charactersheet-init-formula">
        <span data-i18n="field.basis">Basis</span>
        <input
          type="number"
          name="attr_sr6_matrix_initiative"
          readonly />
      </div>
      <div class="sr6-charactersheet-init-formula-with-dice">
        <span data-i18n="field.w6">W6</span>
        <div class="sr6-charactersheet-field-input-with-dice">
          <input
            type="number"
            name="attr_sr6_matrix_initiative_w6"
            value="4" /><button
            type="action"
            class="sr6-charactersheet-field-dice-button"
            name="act_probe"
            value="&{template:default} {{name=Initiative: Matrix}} {{Basis=[[@{sr6_matrix_initiative}]]}} {{W6=[[@{sr6_matrix_initiative_w6}d6]]}} {{Gesamt=[[@{sr6_matrix_initiative}+(@{sr6_matrix_initiative_w6}d6)]]}}"
            aria-label="Wuerfeln"></button>
        </div>
      </div>
    </div>
    <!-- END BLOCK: Zeile - Matrix-Initiative -->
  </div>
</section>
<!-- END BLOCK: Initiative -->
