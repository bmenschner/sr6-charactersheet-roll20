<!-- BEGIN BLOCK: Kampf -->
<section
  class="sr6-charactersheet-box sr6-charactersheet-box-kampf sr6-editable-section sr6-editable-overview-section"
  aria-labelledby="kampf-titel">
  <div class="sr6-editable-section-title-row">
    <h1
      id="kampf-titel"
      class="sr6-charactersheet-box-title"
      data-i18n="section.wichtige_kampf_infos">
      Kampf
    </h1>
    <label class="sr6-editable-section-toggle">
      <input
        type="checkbox"
        name="attr_sr6_allgemein_kampf_edit_mode"
        class="sr6-editable-section-mode"
                      />
                    <span data-i18n="field.editieren">Editieren</span>
    </label>
  </div>

  <div class="sr6-charactersheet-box-content">
    <!-- BEGIN BLOCK: Kampf Spalten -->
    <div class="sr6-charactersheet-kampfinfos-grid">
      <!-- BEGIN BLOCK: Spalte 1 - Nahkampf -->
      <div class="sr6-charactersheet-kampfinfos-column">
        <!-- BEGIN BLOCK: Primäre Nahkampfwaffe -->
        <div class="sr6-charactersheet-row sr6-charactersheet-row-1">
          <div class="sr6-charactersheet-field">
            <span data-i18n="field.primaere_nahkampfwaffe">Primäre Nahkampfwaffe</span>
            <input type="text" name="attr_sr6_combat_primaere_nahkampfwaffe" readonly />
          </div>
        </div>
        <!-- END BLOCK: Primäre Nahkampfwaffe -->

        <div class="sr6-charactersheet-row sr6-charactersheet-row-1">
          <div class="sr6-charactersheet-field">
            <span class="sr6-kampf-section-label" data-i18n="field.angriffswerte_reichweite">Angriffswerte (Reichweite)</span>
          </div>
        </div>

        <!-- BEGIN BLOCK: Nahkampf Schaden/Reichweiten -->
        <div class="sr6-charactersheet-row sr6-charactersheet-row-3">
          <div class="sr6-charactersheet-field">
            <span data-i18n="field.schaden">Schaden</span>
            <input type="number" name="attr_sr6_combat_nahkampf_schaden" readonly />
          </div>
          <div class="sr6-charactersheet-field">
            <span data-i18n="field.schadentyp">Schadenstyp</span>
            <input type="text" name="attr_sr6_combat_nahkampf_schadentyp" readonly />
          </div>
          <div class="sr6-charactersheet-field">
            <span data-i18n="field.attribut">Attribut</span>
            <input type="text" name="attr_sr6_combat_nahkampf_attribut" readonly />
          </div>
        </div>
        <div class="sr6-charactersheet-row sr6-charactersheet-row-5">
          <div class="sr6-charactersheet-field">
            <span data-i18n="field.s_nah">S. Nah</span>
            <div class="sr6-charactersheet-field-input-with-dice">
              <input type="number" name="attr_sr6_combat_nahkampf_sehr_nah" readonly /><button
                type="action"
                class="sr6-charactersheet-field-dice-button"
                name="act_probe"
                value="&{template:default} {{name=Nahkampf-Test}} {{Waffe=@{sr6_combat_primaere_nahkampfwaffe}}} {{Fertigkeit=@{sr6_combat_nahkampf_fertigkeit}}} {{Attribut=@{sr6_combat_nahkampf_attribut}}} {{Schadenswert=@{sr6_combat_nahkampf_schaden}}} {{Schadenstyp=@{sr6_combat_nahkampf_schadentyp}}} {{Reichweite=S. Nah}} {{Pool=[[@{sr6_combat_nahkampf_sehr_nah}]]}} {{Erfolge=[[@{sr6_combat_nahkampf_sehr_nah}d6>5]]}}"
                aria-label="Wuerfeln"></button>
            </div>
          </div>
          <div class="sr6-charactersheet-field">
            <span data-i18n="field.nah">Nah</span>
            <div class="sr6-charactersheet-field-input-with-dice">
              <input type="number" name="attr_sr6_combat_nahkampf_nah" readonly /><button
                type="action"
                class="sr6-charactersheet-field-dice-button"
                name="act_probe"
                value="&{template:default} {{name=Nahkampf-Test}} {{Waffe=@{sr6_combat_primaere_nahkampfwaffe}}} {{Fertigkeit=@{sr6_combat_nahkampf_fertigkeit}}} {{Attribut=@{sr6_combat_nahkampf_attribut}}} {{Schadenswert=@{sr6_combat_nahkampf_schaden}}} {{Schadenstyp=@{sr6_combat_nahkampf_schadentyp}}} {{Reichweite=Nah}} {{Pool=[[@{sr6_combat_nahkampf_nah}]]}} {{Erfolge=[[@{sr6_combat_nahkampf_nah}d6>5]]}}"
                aria-label="Wuerfeln"></button>
            </div>
          </div>
          <div class="sr6-charactersheet-field">
            <span data-i18n="field.mittel">Mittel</span>
            <div class="sr6-charactersheet-field-input-with-dice">
              <input type="number" name="attr_sr6_combat_nahkampf_mittel" readonly /><button
                type="action"
                class="sr6-charactersheet-field-dice-button"
                name="act_probe"
                value="&{template:default} {{name=Nahkampf-Test}} {{Waffe=@{sr6_combat_primaere_nahkampfwaffe}}} {{Fertigkeit=@{sr6_combat_nahkampf_fertigkeit}}} {{Attribut=@{sr6_combat_nahkampf_attribut}}} {{Schadenswert=@{sr6_combat_nahkampf_schaden}}} {{Schadenstyp=@{sr6_combat_nahkampf_schadentyp}}} {{Reichweite=Mittel}} {{Pool=[[@{sr6_combat_nahkampf_mittel}]]}} {{Erfolge=[[@{sr6_combat_nahkampf_mittel}d6>5]]}}"
                aria-label="Wuerfeln"></button>
            </div>
          </div>
          <div class="sr6-charactersheet-field">
            <span data-i18n="field.weit">Weit</span>
            <div class="sr6-charactersheet-field-input-with-dice">
              <input type="number" name="attr_sr6_combat_nahkampf_weit" readonly /><button
                type="action"
                class="sr6-charactersheet-field-dice-button"
                name="act_probe"
                value="&{template:default} {{name=Nahkampf-Test}} {{Waffe=@{sr6_combat_primaere_nahkampfwaffe}}} {{Fertigkeit=@{sr6_combat_nahkampf_fertigkeit}}} {{Attribut=@{sr6_combat_nahkampf_attribut}}} {{Schadenswert=@{sr6_combat_nahkampf_schaden}}} {{Schadenstyp=@{sr6_combat_nahkampf_schadentyp}}} {{Reichweite=Weit}} {{Pool=[[@{sr6_combat_nahkampf_weit}]]}} {{Erfolge=[[@{sr6_combat_nahkampf_weit}d6>5]]}}"
                aria-label="Wuerfeln"></button>
            </div>
          </div>
          <div class="sr6-charactersheet-field">
            <span data-i18n="field.s_weit">S. Weit</span>
            <div class="sr6-charactersheet-field-input-with-dice">
              <input type="number" name="attr_sr6_combat_nahkampf_sehr_weit" readonly /><button
                type="action"
                class="sr6-charactersheet-field-dice-button"
                name="act_probe"
                value="&{template:default} {{name=Nahkampf-Test}} {{Waffe=@{sr6_combat_primaere_nahkampfwaffe}}} {{Fertigkeit=@{sr6_combat_nahkampf_fertigkeit}}} {{Attribut=@{sr6_combat_nahkampf_attribut}}} {{Schadenswert=@{sr6_combat_nahkampf_schaden}}} {{Schadenstyp=@{sr6_combat_nahkampf_schadentyp}}} {{Reichweite=S. Weit}} {{Pool=[[@{sr6_combat_nahkampf_sehr_weit}]]}} {{Erfolge=[[@{sr6_combat_nahkampf_sehr_weit}d6>5]]}}"
                aria-label="Wuerfeln"></button>
            </div>
          </div>
        </div>
        <!-- END BLOCK: Nahkampf Schaden/Reichweiten -->

      </div>
      <!-- END BLOCK: Spalte 1 - Nahkampf -->
    </div>
    <!-- END BLOCK: Kampf Spalten -->
  </div>
</section>
<!-- END BLOCK: Kampf -->
