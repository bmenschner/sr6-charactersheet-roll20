  <!-- BEGIN BLOCK: Rigging Kernwerte -->
  <section class="sr6-charactersheet-box sr6-charactersheet-tab-rigging-item--full" aria-labelledby="rigging-kern-titel">
    <h2 id="rigging-kern-titel" class="sr6-charactersheet-box-title" data-i18n="section.rigging_kern">
      Rigging: Kernwerte
    </h2>

    <div class="sr6-charactersheet-box-content">
      <div class="sr6-charactersheet-row sr6-charactersheet-row-3">
        <div class="sr6-charactersheet-field">
          <span data-i18n="field.riggerkonsole">Riggerkonsole</span>
          <input type="text" name="attr_sr6_rigging_riggerkonsole" />
        </div>

        <div class="sr6-charactersheet-field">
          <span data-i18n="field.modus">Modus</span>
          <select name="attr_sr6_rigging_modus">
            <option value="AR" data-i18n="field.rigging_modus_ar">AR</option>
            <option value="VR Kalt" data-i18n="field.rigging_modus_vr_kalt">VR - Kalt</option>
            <option value="VR Heiss" data-i18n="field.rigging_modus_vr_heiss">VR - Heiß</option>
          </select>
        </div>

        <div class="sr6-charactersheet-field">
          <span data-i18n="field.rigging_initiative">Rigging-Initiative</span>
          <div class="sr6-charactersheet-initiative-input">
            <input type="number" name="attr_sr6_rigging_initiative" readonly />
            <span class="sr6-charactersheet-initiative-plus" aria-hidden="true">+</span>
            <span class="sr6-charactersheet-initiative-dice-label" data-i18n="field.w6">W6</span>
            <div class="sr6-charactersheet-field-input-with-dice">
              <input type="number" name="attr_sr6_rigging_initiative_w6" readonly /><button
              type="action"
              class="sr6-charactersheet-field-dice-button"
              name="act_probe"
              value="&{template:default} {{name=Rigging-Initiative}} {{Basis=[[@{sr6_rigging_initiative}]]}} {{W6=[[@{sr6_rigging_initiative_w6}d6]]}} {{Gesamt=[[@{sr6_rigging_initiative}+(@{sr6_rigging_initiative_w6}d6)]]}}"
              aria-label="Wuerfeln"></button>
            </div>
          </div>
        </div>
      </div>

      <div class="sr6-charactersheet-row sr6-charactersheet-row-4">
        <div class="sr6-charactersheet-field">
          <span data-i18n="field.matrix_angriff">Angriff</span>
          <div class="sr6-charactersheet-field-input-with-dice">
            <input type="number" name="attr_sr6_rigging_angriff" /><button
              type="action"
              class="sr6-charactersheet-field-dice-button"
              name="act_probe"
              value="&{template:default} {{name=Rigging-Kernwert}} {{Wert=Angriff}} {{Pool=[[@{sr6_rigging_angriff}]]}} {{Erfolge=[[@{sr6_rigging_angriff}d6>5]]}}"
              aria-label="Wuerfeln"></button>
          </div>
        </div>

        <div class="sr6-charactersheet-field">
          <span data-i18n="field.matrix_schleicher">Schleicher</span>
          <div class="sr6-charactersheet-field-input-with-dice">
            <input type="number" name="attr_sr6_rigging_schleicher" /><button
              type="action"
              class="sr6-charactersheet-field-dice-button"
              name="act_probe"
              value="&{template:default} {{name=Rigging-Kernwert}} {{Wert=Schleicher}} {{Pool=[[@{sr6_rigging_schleicher}]]}} {{Erfolge=[[@{sr6_rigging_schleicher}d6>5]]}}"
              aria-label="Wuerfeln"></button>
          </div>
        </div>

        <div class="sr6-charactersheet-field">
          <span data-i18n="field.matrix_datenverarbeitung">Datenverarbeitung</span>
          <div class="sr6-charactersheet-field-input-with-dice">
            <input type="number" name="attr_sr6_rigging_datenverarbeitung" /><button
              type="action"
              class="sr6-charactersheet-field-dice-button"
              name="act_probe"
              value="&{template:default} {{name=Rigging-Kernwert}} {{Wert=Datenverarbeitung}} {{Pool=[[@{sr6_rigging_datenverarbeitung}]]}} {{Erfolge=[[@{sr6_rigging_datenverarbeitung}d6>5]]}}"
              aria-label="Wuerfeln"></button>
          </div>
        </div>

        <div class="sr6-charactersheet-field">
          <span data-i18n="field.matrix_firewall">Firewall</span>
          <div class="sr6-charactersheet-field-input-with-dice">
            <input type="number" name="attr_sr6_rigging_firewall" /><button
              type="action"
              class="sr6-charactersheet-field-dice-button"
              name="act_probe"
              value="&{template:default} {{name=Rigging-Kernwert}} {{Wert=Firewall}} {{Pool=[[@{sr6_rigging_firewall}]]}} {{Erfolge=[[@{sr6_rigging_firewall}d6>5]]}}"
              aria-label="Wuerfeln"></button>
          </div>
        </div>
      </div>

      <div class="sr6-charactersheet-row sr6-charactersheet-row-5">
        <div class="sr6-charactersheet-field">
          <span data-i18n="field.angriffswert">Angriffswert</span>
          <div class="sr6-charactersheet-field-input-with-dice">

              aria-label="Wuerfeln"></button>
          </div>
        </div>

        <div class="sr6-charactersheet-field">
          <span data-i18n="field.verteidigungswert">Verteidigungswert</span>
          <div class="sr6-charactersheet-field-input-with-dice">
            <input type="number" name="attr_sr6_rigging_verteidigungswert" /><button
              type="action"
              class="sr6-charactersheet-field-dice-button"
              name="act_probe"
              value="&{template:default} {{name=Rigging-Kernwert}} {{Wert=Verteidigungswert}} {{Pool=[[@{sr6_rigging_verteidigungswert}]]}} {{Erfolge=[[@{sr6_rigging_verteidigungswert}d6>5]]}}"
              aria-label="Wuerfeln"></button>
          </div>
        </div>

        <div class="sr6-charactersheet-field">
          <span data-i18n="field.matrix_verteidigung">Matrix Verteidigung</span>
          <div class="sr6-charactersheet-field-input-with-dice">
            <input type="number" name="attr_sr6_rigging_matrix_verteidigung" /><button
              type="action"
              class="sr6-charactersheet-field-dice-button"
              name="act_probe"
              value="&{template:default} {{name=Rigging-Kernwert}} {{Wert=Matrix Verteidigung}} {{Pool=[[@{sr6_rigging_matrix_verteidigung}]]}} {{Erfolge=[[@{sr6_rigging_matrix_verteidigung}d6>5]]}}"
              aria-label="Wuerfeln"></button>
          </div>
        </div>

        <div class="sr6-charactersheet-field">
          <span data-i18n="field.matrix_schadenswiderstand">Matrix Schadenswiderstand</span>
          <div class="sr6-charactersheet-field-input-with-dice">
            <input type="number" name="attr_sr6_rigging_matrix_schadenswiderstand" /><button
              type="action"
              class="sr6-charactersheet-field-dice-button"
              name="act_probe"
              value="&{template:default} {{name=Rigging-Kernwert}} {{Wert=Matrix Schadenswiderstand}} {{Pool=[[@{sr6_rigging_matrix_schadenswiderstand}]]}} {{Erfolge=[[@{sr6_rigging_matrix_schadenswiderstand}d6>5]]}}"
              aria-label="Wuerfeln"></button>
          </div>
        </div>

        <div class="sr6-charactersheet-field">
          <span data-i18n="field.biofeedback_schadenswiderstand">Biofeedback Schadenswiderstand</span>
          <div class="sr6-charactersheet-field-input-with-dice">
            <input type="number" name="attr_sr6_rigging_biofeedback_schadenswiderstand" /><button
              type="action"
              class="sr6-charactersheet-field-dice-button"
              name="act_probe"
              value="&{template:default} {{name=Rigging-Kernwert}} {{Wert=Biofeedback Schadenswiderstand}} {{Pool=[[@{sr6_rigging_biofeedback_schadenswiderstand}]]}} {{Erfolge=[[@{sr6_rigging_biofeedback_schadenswiderstand}d6>5]]}}"
              aria-label="Wuerfeln"></button>
          </div>
        </div>
      </div>
    </div>
  </section>
