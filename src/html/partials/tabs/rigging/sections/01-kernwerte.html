  <!-- BEGIN BLOCK: Rigging Kernwerte -->
  <section class="sr6-charactersheet-box sr6-charactersheet-kernwerte-box sr6-charactersheet-tab-rigging-item--full" aria-labelledby="rigging-kern-titel">
    <h2 id="rigging-kern-titel" class="sr6-charactersheet-box-title" data-i18n="section.rigging_kern">
      Rigging: Kernwerte
    </h2>

    <div class="sr6-charactersheet-box-content">
      <span class="sr6-charactersheet-kernwerte-subtitle" data-i18n="field.rigging_riggerkonsole_modus">Riggerkonsole (Modus)</span>

      <div class="sr6-charactersheet-row sr6-charactersheet-row-3">
        <div class="sr6-charactersheet-field">
          <span data-i18n="field.riggerkonsole">Riggerkonsole</span>
          <input type="text" name="attr_sr6_rigging_riggerkonsole" />
        </div>

        <div class="sr6-charactersheet-field">
          <span data-i18n="field.modus">Modus</span>
          <select name="attr_sr6_rigging_modus">
            <option value="AR" data-i18n="field.rigging_modus_ar">AR</option>
            <option value="VR Kalt" data-i18n="field.rigging_modus_vr_kalt">VR - Kalt</option>
            <option value="VR Heiss" data-i18n="field.rigging_modus_vr_heiss">VR - Heiß</option>
          </select>
        </div>

        <div class="sr6-charactersheet-field">
          <div class="sr6-field-label-with-info"><span data-i18n="field.rigging_initiative">Rigging-Initiative</span><span class="sr6-info-icon" title="Rigging-Initiative = bei AR wie physische Initiative; bei VR Intuition + Datenverarbeitung + Modifikator + 2W6/3W6 + W6-Modifikator">i</span></div>
          <div class="sr6-charactersheet-initiative-input">
            <input type="number" name="attr_sr6_rigging_initiative" readonly />
            <div class="sr6-number-stepper">
              <button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_rigging_initiative_modifikator::-1" aria-label="Initiative-Modifikator verringern">-</button>
              <input type="number" name="attr_sr6_rigging_initiative_modifikator" value="0" title="VR-Initiative-Modifikator" />
              <button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_rigging_initiative_modifikator::1" aria-label="Initiative-Modifikator erhoehen">+</button>
            </div>
            <span class="sr6-charactersheet-initiative-dice-label" data-i18n="field.w6">W6</span>
            <input type="number" name="attr_sr6_rigging_initiative_w6" readonly />
            <div class="sr6-number-stepper">
              <button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_rigging_initiative_w6_modifikator::-1" aria-label="Initiative-W6-Modifikator verringern">-</button>
              <input type="number" name="attr_sr6_rigging_initiative_w6_modifikator" value="0" title="VR-Initiative-W6-Modifikator" />
              <button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_rigging_initiative_w6_modifikator::1" aria-label="Initiative-W6-Modifikator erhoehen">+</button>
            </div>
            <button
              type="action"
              class="sr6-charactersheet-field-dice-button"
              name="act_probe"
              value="&{template:default} {{name=Rigging-Initiative}} {{Initiative=Rigging-Initiative}} {{Basis=@{sr6_rigging_initiative}}} {{Basis-Modifikator=@{sr6_rigging_initiative_modifikator}}} {{W6=@{sr6_rigging_initiative_w6}}} {{W6-Modifikator=@{sr6_rigging_initiative_w6_modifikator}}} {{Modus=@{sr6_rigging_modus}}}"
              aria-label="Wuerfeln"></button>
          </div>
        </div>
      </div>

    </div>
  </section>
  <!-- END BLOCK: Rigging Kernwerte -->
