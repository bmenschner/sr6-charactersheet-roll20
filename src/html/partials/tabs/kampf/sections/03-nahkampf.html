<!-- BEGIN BLOCK: Kampf Nahkampf -->
<section
  class="sr6-charactersheet-box sr6-charactersheet-box-kampf-nahkampf sr6-kampf-lockable-section"
  aria-labelledby="kampf-nahkampf-titel">
  <div class="sr6-editable-section-title-row">
    <h2
      id="kampf-nahkampf-titel"
      class="sr6-charactersheet-box-title"
      data-i18n="section.kampf_nahkampf">
      Nahkampfwaffen
    </h2>
    <label class="sr6-editable-section-toggle">
      <input
        type="checkbox"
        name="attr_sr6_kampf_nahkampf_edit_mode"
        class="sr6-editable-section-mode" />
      <span data-i18n="field.editieren">Editieren</span>
    </label>
  </div>

  <div class="sr6-charactersheet-box-content">
    <!-- BEGIN BLOCK: Repeating Nahkampfwaffen -->
    <fieldset class="repeating_sr6nahkampfwaffen">
      <div class="sr6-foundry-item">
        <div class="sr6-editable-item-fields">
        <div class="sr6-foundry-item-head sr6-charactersheet-row sr6-charactersheet-row-6">
          <div class="sr6-charactersheet-field">
            <span data-i18n="field.nahkampfwaffe">Nahkampfwaffe</span>
            <input type="text" name="attr_sr6_nahkampfwaffe" />
          </div>

          <div class="sr6-charactersheet-field">
            <span data-i18n="field.attribut">Attribut</span>
            <select name="attr_sr6_nahkampf_attribut">
              <option value="Geschicklichkeit" data-i18n="field.geschicklichkeit">Geschicklichkeit</option>
              <option value="Stärke" data-i18n="field.staerke">Stärke</option>
            </select>
          </div>

          <div class="sr6-charactersheet-field">
            <span data-i18n="field.fertigkeit">Fertigkeit</span>
            <select name="attr_sr6_nahkampf_fertigkeit">
              <option value="Nahkampf" data-i18n="skill.nahkampf">Nahkampf</option>
              <option value="Exotische Waffen" data-i18n="skill.exotische_waffen">Exotische Waffen</option>
            </select>
          </div>

          <div class="sr6-charactersheet-field">
            <span data-i18n="field.waffentyp">Waffentyp</span>
            <select name="attr_sr6_nahkampf_waffentyp">
              <option value="Klinge" data-i18n="field.waffentyp_klinge">Klinge</option>
              <option value="Knüppel" data-i18n="field.waffentyp_knueppel">Knüppel</option>
              <option value="Unbewaffnet" data-i18n="field.waffentyp_unbewaffnet">Unbewaffnet</option>
              <option value="Stangenwaffe" data-i18n="field.waffentyp_stangenwaffe">Stangenwaffe</option>
              <option value="Exotisch" data-i18n="field.waffentyp_exotisch">Exotisch</option>
            </select>
          </div>
          <div class="sr6-charactersheet-field">
            <span data-i18n="field.schaden">Schaden</span>
            <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_nahkampf_schaden::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_nahkampf_schaden" /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_nahkampf_schaden::1" aria-label="Erhoehen">+</button></div>
          </div>
          <div class="sr6-charactersheet-field">
            <span data-i18n="field.schadentyp">Schadenstyp</span>
            <select name="attr_sr6_nahkampf_schadentyp">
              <option value="Körperlich" data-i18n="field.schadentyp_koerperlich">Körperlich</option>
              <option value="Betäubung" data-i18n="field.schadentyp_betaeubung">Betäubung</option>
            </select>
          </div>
        </div>

        <div class="sr6-foundry-item-row sr6-charactersheet-row sr6-charactersheet-row-1">
          <div class="sr6-charactersheet-field">
            <span class="sr6-foundry-item-section-label" data-i18n="field.angriffswerte_reichweite">Angriffswerte (Reichweite)</span>
          </div>
        </div>

        <div class="sr6-foundry-item-range sr6-charactersheet-row sr6-charactersheet-row-5 sr6-kampf-nahkampf-range-row">
          <div class="sr6-charactersheet-field sr6-kampf-nahkampf-range-field">
            <span data-i18n="field.s_nah">S. Nah</span>
            <div class="sr6-charactersheet-field-input-with-dice">
              <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_nahkampf_s_nah::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_nahkampf_s_nah" /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_nahkampf_s_nah::1" aria-label="Erhoehen">+</button></div><button
                type="action"
                class="sr6-charactersheet-field-dice-button"
                name="act_probe"
                value="&{template:default} {{name=Nahkampf-Test}} {{Waffe=@{sr6_nahkampfwaffe}}} {{Fertigkeit=@{sr6_nahkampf_fertigkeit}}} {{Attribut=@{sr6_nahkampf_attribut}}} {{Schadenswert=@{sr6_nahkampf_schaden}}} {{Schadenstyp=@{sr6_nahkampf_schadentyp}}} {{Reichweite=S. Nah}} {{Pool=[[@{sr6_nahkampf_s_nah}]]}} {{Erfolge=[[@{sr6_nahkampf_s_nah}d6>5]]}}"
                aria-label="Wuerfeln"></button>
            </div>
          </div>

          <div class="sr6-charactersheet-field sr6-kampf-nahkampf-range-field">
            <span data-i18n="field.nah">Nah</span>
            <div class="sr6-charactersheet-field-input-with-dice">
              <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_nahkampf_nah::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_nahkampf_nah" /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_nahkampf_nah::1" aria-label="Erhoehen">+</button></div><button
                type="action"
                class="sr6-charactersheet-field-dice-button"
                name="act_probe"
                value="&{template:default} {{name=Nahkampf-Test}} {{Waffe=@{sr6_nahkampfwaffe}}} {{Fertigkeit=@{sr6_nahkampf_fertigkeit}}} {{Attribut=@{sr6_nahkampf_attribut}}} {{Schadenswert=@{sr6_nahkampf_schaden}}} {{Schadenstyp=@{sr6_nahkampf_schadentyp}}} {{Reichweite=Nah}} {{Pool=[[@{sr6_nahkampf_nah}]]}} {{Erfolge=[[@{sr6_nahkampf_nah}d6>5]]}}"
                aria-label="Wuerfeln"></button>
            </div>
          </div>

          <div class="sr6-charactersheet-field sr6-kampf-nahkampf-range-field">
            <span data-i18n="field.mittel">Mittel</span>
            <div class="sr6-charactersheet-field-input-with-dice">
              <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_nahkampf_mittel::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_nahkampf_mittel" /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_nahkampf_mittel::1" aria-label="Erhoehen">+</button></div><button
                type="action"
                class="sr6-charactersheet-field-dice-button"
                name="act_probe"
                value="&{template:default} {{name=Nahkampf-Test}} {{Waffe=@{sr6_nahkampfwaffe}}} {{Fertigkeit=@{sr6_nahkampf_fertigkeit}}} {{Attribut=@{sr6_nahkampf_attribut}}} {{Schadenswert=@{sr6_nahkampf_schaden}}} {{Schadenstyp=@{sr6_nahkampf_schadentyp}}} {{Reichweite=Mittel}} {{Pool=[[@{sr6_nahkampf_mittel}]]}} {{Erfolge=[[@{sr6_nahkampf_mittel}d6>5]]}}"
                aria-label="Wuerfeln"></button>
            </div>
          </div>

          <div class="sr6-charactersheet-field sr6-kampf-nahkampf-range-field">
            <span data-i18n="field.weit">Weit</span>
            <div class="sr6-charactersheet-field-input-with-dice">
              <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_nahkampf_weit::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_nahkampf_weit" /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_nahkampf_weit::1" aria-label="Erhoehen">+</button></div><button
                type="action"
                class="sr6-charactersheet-field-dice-button"
                name="act_probe"
                value="&{template:default} {{name=Nahkampf-Test}} {{Waffe=@{sr6_nahkampfwaffe}}} {{Fertigkeit=@{sr6_nahkampf_fertigkeit}}} {{Attribut=@{sr6_nahkampf_attribut}}} {{Schadenswert=@{sr6_nahkampf_schaden}}} {{Schadenstyp=@{sr6_nahkampf_schadentyp}}} {{Reichweite=Weit}} {{Pool=[[@{sr6_nahkampf_weit}]]}} {{Erfolge=[[@{sr6_nahkampf_weit}d6>5]]}}"
                aria-label="Wuerfeln"></button>
            </div>
          </div>

          <div class="sr6-charactersheet-field sr6-kampf-nahkampf-range-field">
            <span data-i18n="field.s_weit">S. Weit</span>
            <div class="sr6-charactersheet-field-input-with-dice">
              <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_nahkampf_s_weit::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_nahkampf_s_weit" /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_nahkampf_s_weit::1" aria-label="Erhoehen">+</button></div><button
                type="action"
                class="sr6-charactersheet-field-dice-button"
                name="act_probe"
                value="&{template:default} {{name=Nahkampf-Test}} {{Waffe=@{sr6_nahkampfwaffe}}} {{Fertigkeit=@{sr6_nahkampf_fertigkeit}}} {{Attribut=@{sr6_nahkampf_attribut}}} {{Schadenswert=@{sr6_nahkampf_schaden}}} {{Schadenstyp=@{sr6_nahkampf_schadentyp}}} {{Reichweite=S. Weit}} {{Pool=[[@{sr6_nahkampf_s_weit}]]}} {{Erfolge=[[@{sr6_nahkampf_s_weit}d6>5]]}}"
                aria-label="Wuerfeln"></button>
            </div>
          </div>
        </div>

        <div class="sr6-foundry-item-footer sr6-charactersheet-row sr6-charactersheet-row-2">
          <div class="sr6-charactersheet-field sr6-charactersheet-mod-popup">
            <details>
              <summary data-i18n="field.modifikationen">Modifikationen</summary>
              <div class="sr6-charactersheet-mod-popup-panel">
                <span data-i18n="field.modifikationen">Modifikationen</span>
                <textarea
                  name="attr_sr6_nahkampf_modifikationen"
                  rows="4"
                  placeholder="z. B. Reichweitenmodul, Teleskopschaft"></textarea>
              </div>
            </details>
          </div>
          <label class="sr6-kampf-selection-toggle">
            <input type="checkbox" name="attr_sr6_nahkampf_ist_primaer" value="1" />
            <span data-i18n="field.primaere_nahkampfwaffe">Primäre Nahkampfwaffe</span>
          </label>
        </div>
        </div>
      </div>
    </fieldset>
    <!-- END BLOCK: Repeating Nahkampfwaffen -->
  </div>
</section>
<!-- END BLOCK: Kampf Nahkampf -->
