<!-- BEGIN BLOCK: Kampf Panzerung -->
<section
  class="sr6-charactersheet-box sr6-charactersheet-box-kampf-panzerung sr6-kampf-lockable-section"
  aria-labelledby="kampf-panzerung-titel">
  <div class="sr6-editable-section-title-row">
    <h2
      id="kampf-panzerung-titel"
      class="sr6-charactersheet-box-title"
      data-i18n="section.kampf_panzerung">
      Panzerung
    </h2>
    <label class="sr6-editable-section-toggle">
      <input
        type="checkbox"
        name="attr_sr6_kampf_panzerung_edit_mode"
        class="sr6-editable-section-mode" />
      <span data-i18n="field.editieren">Editieren</span>
    </label>
  </div>

  <div class="sr6-charactersheet-box-content">
    <!-- BEGIN BLOCK: Repeating Panzerung -->
    <fieldset class="repeating_sr6panzerung">
      <div class="sr6-foundry-item sr6-foundry-item--armor">
        <div class="sr6-editable-item-fields">
          <div class="sr6-foundry-item-head sr6-charactersheet-row sr6-charactersheet-row-3">
            <label class="sr6-charactersheet-field">
              <span data-i18n="field.panzerung">Panzerung</span>
              <input type="text" name="attr_sr6_panzerung_name" />
            </label>

            <label class="sr6-charactersheet-field">
              <span data-i18n="field.verteidigungswert">Verteidigungswert</span>
              <input type="number" name="attr_sr6_panzerung_verteidigungswert" />
            </label>

            <label class="sr6-charactersheet-field">
              <span data-i18n="field.sozial">Sozial</span>
              <input type="text" name="attr_sr6_panzerung_sozial" />
            </label>
          </div>
        </div>
        <div class="sr6-foundry-item-footer sr6-charactersheet-row sr6-charactersheet-row-4 sr6-kampf-panzerung-rollen">
          <label class="sr6-charactersheet-field sr6-charactersheet-field--checkbox">
            <span data-i18n="field.primaere_panzerung">Primäre Panzerung</span>
            <input type="checkbox" name="attr_sr6_panzerung_ist_primaer" value="1" />
          </label>
          <label class="sr6-charactersheet-field sr6-charactersheet-field--checkbox">
            <span data-i18n="field.sekundaere_panzerung">Sekundäre Panzerung</span>
            <input type="checkbox" name="attr_sr6_panzerung_ist_sekundaer" value="1" />
          </label>
          <label class="sr6-charactersheet-field sr6-charactersheet-field--checkbox">
            <span data-i18n="field.helm">Helm</span>
            <input type="checkbox" name="attr_sr6_panzerung_ist_helm" value="1" />
          </label>
          <label class="sr6-charactersheet-field sr6-charactersheet-field--checkbox">
            <span data-i18n="field.schild">Schild</span>
            <input type="checkbox" name="attr_sr6_panzerung_ist_schild" value="1" />
          </label>
        </div>
      </div>
    </fieldset>
    <!-- END BLOCK: Repeating Panzerung -->
  </div>
</section>
<!-- END BLOCK: Kampf Panzerung -->
