<!-- BEGIN BLOCK: Kampf Kernwerte -->
<section
  class="sr6-charactersheet-box sr6-charactersheet-box-kampf-kernwerte"
  aria-labelledby="kampf-kernwerte-titel">
  <h2
    id="kampf-kernwerte-titel"
    class="sr6-charactersheet-box-title"
    data-i18n="section.kampf_kernwerte">
    Kampf: Kernwerte
  </h2>

  <div class="sr6-charactersheet-box-content">
    <!-- BEGIN BLOCK: Zeile 1 -->
    <div class="sr6-charactersheet-row sr6-charactersheet-row-2">
      <div class="sr6-charactersheet-field">
        <span data-i18n="field.primaere_fernkampfwaffe">Primäre Fernkampfwaffe</span>
        <input type="text" name="attr_sr6_combat_primaere_fernkampfwaffe" />
      </div>
      <div class="sr6-charactersheet-field">
        <span data-i18n="field.primaere_nahkampfwaffe">Primäre Nahkampfwaffe</span>
        <input type="text" name="attr_sr6_combat_primaere_nahkampfwaffe" />
      </div>
    </div>
    <!-- END BLOCK: Zeile 1 -->

    <div class="sr6-charactersheet-row sr6-charactersheet-row-1">
      <div class="sr6-charactersheet-field">
        <span class="sr6-kampf-section-label" data-i18n="field.wuerfelpool">Würfelpool</span>
      </div>
    </div>

    <!-- BEGIN BLOCK: Zeile 2 -->
    <div class="sr6-charactersheet-row sr6-charactersheet-row-4">
      <div class="sr6-charactersheet-field">
        <span data-i18n="field.fernkampfangriff">Fernkampfangriff</span>
        <div class="sr6-charactersheet-field-input-with-dice">
          <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_combat_fernkampfangriff_gesamtwert::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_combat_fernkampfangriff_gesamtwert" readonly /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_combat_fernkampfangriff_gesamtwert::1" aria-label="Erhoehen">+</button></div><button
            type="action"
            class="sr6-charactersheet-field-dice-button"
            name="act_probe"
            value="&{template:default} {{name=Kampf: Kernwerte}} {{Wert=Fernkampfangriff}} {{Pool=[[@{sr6_combat_fernkampfangriff_gesamtwert}]]}} {{Erfolge=[[@{sr6_combat_fernkampfangriff_gesamtwert}d6>5]]}}"
            aria-label="Wuerfeln"></button>
        </div>
      </div>
      <div class="sr6-charactersheet-field">
        <span data-i18n="field.nahkampfangriff">Nahkampfangriff</span>
        <div class="sr6-charactersheet-field-input-with-dice">
          <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_combat_nahkampfangriff_gesamtwert::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_combat_nahkampfangriff_gesamtwert" readonly /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_combat_nahkampfangriff_gesamtwert::1" aria-label="Erhoehen">+</button></div><button
            type="action"
            class="sr6-charactersheet-field-dice-button"
            name="act_probe"
            value="&{template:default} {{name=Kampf: Kernwerte}} {{Wert=Nahkampfangriff}} {{Pool=[[@{sr6_combat_nahkampfangriff_gesamtwert}]]}} {{Erfolge=[[@{sr6_combat_nahkampfangriff_gesamtwert}d6>5]]}}"
            aria-label="Wuerfeln"></button>
        </div>
      </div>
      <div class="sr6-charactersheet-field">
        <span data-i18n="field.verteidigung_physisch">Verteidigung (Physisch)</span>
        <div class="sr6-charactersheet-field-input-with-dice">
          <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_verteidigung_physisch_gesamtwert::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_verteidigung_physisch_gesamtwert" readonly /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_verteidigung_physisch_gesamtwert::1" aria-label="Erhoehen">+</button></div><button
            type="action"
            class="sr6-charactersheet-field-dice-button"
            name="act_probe"
            value="&{template:default} {{name=Kampf: Kernwerte}} {{Wert=Verteidigung (Physisch)}} {{Pool=[[@{sr6_verteidigung_physisch_gesamtwert}]]}} {{Erfolge=[[@{sr6_verteidigung_physisch_gesamtwert}d6>5]]}}"
            aria-label="Wuerfeln"></button>
        </div>
      </div>
      <div class="sr6-charactersheet-field">
        <span data-i18n="field.schadenswiderstand_physisch">Schadenswiderstand (Physisch)</span>
        <div class="sr6-charactersheet-field-input-with-dice">
          <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_schadenswiderstand_physisch_gesamtwert::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_schadenswiderstand_physisch_gesamtwert" readonly /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_schadenswiderstand_physisch_gesamtwert::1" aria-label="Erhoehen">+</button></div><button
            type="action"
            class="sr6-charactersheet-field-dice-button"
            name="act_probe"
            value="&{template:default} {{name=Kampf: Kernwerte}} {{Wert=Schadenswiderstand (Physisch)}} {{Pool=[[@{sr6_schadenswiderstand_physisch_gesamtwert}]]}} {{Erfolge=[[@{sr6_schadenswiderstand_physisch_gesamtwert}d6>5]]}}"
            aria-label="Wuerfeln"></button>
        </div>
      </div>
    </div>
    <!-- END BLOCK: Zeile 2 -->

    <div class="sr6-charactersheet-row sr6-charactersheet-row-1">
      <div class="sr6-charactersheet-field">
        <span class="sr6-kampf-section-label" data-i18n="field.vergleichswert">Vergleichswert</span>
      </div>
    </div>

    <!-- BEGIN BLOCK: Zeile 3 -->
    <div class="sr6-charactersheet-row sr6-charactersheet-row-5">
      <div class="sr6-charactersheet-field">
        <span data-i18n="field.verteidigungswert">Verteidigungswert</span>
        <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_combat_verteidigungswert_gesamtwert::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_combat_verteidigungswert_gesamtwert" readonly /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_combat_verteidigungswert_gesamtwert::1" aria-label="Erhoehen">+</button></div>
      </div>
      <div class="sr6-charactersheet-field">
        <span data-i18n="field.primaere_panzerung">Primäre Panzerung</span>
        <input type="text" name="attr_sr6_combat_primaere_panzerung_name" readonly />
      </div>
      <div class="sr6-charactersheet-field">
        <span data-i18n="field.sekundaere_panzerung">Sekundäre Panzerung</span>
        <input type="text" name="attr_sr6_combat_sekundaere_panzerung_name" readonly />
      </div>
      <div class="sr6-charactersheet-field">
        <span data-i18n="field.helm">Helm</span>
        <input type="text" name="attr_sr6_combat_helm_name" readonly />
      </div>
      <div class="sr6-charactersheet-field">
        <span data-i18n="field.schild">Schild</span>
        <input type="text" name="attr_sr6_combat_schild_name" readonly />
      </div>
    </div>
    <!-- END BLOCK: Zeile 3 -->
  </div>
</section>
<!-- END BLOCK: Kampf Kernwerte -->
