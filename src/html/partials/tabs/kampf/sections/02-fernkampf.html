<!-- BEGIN BLOCK: Kampf Fernkampf -->
<section
  class="sr6-charactersheet-box sr6-charactersheet-box-kampf-fernkampf sr6-kampf-lockable-section"
  aria-labelledby="kampf-fernkampf-titel">
  <div class="sr6-editable-section-title-row">
    <h2
      id="kampf-fernkampf-titel"
      class="sr6-charactersheet-box-title"
      data-i18n="section.kampf_fernkampf">
      Fernkampfwaffen
    </h2>
    <label class="sr6-editable-section-toggle">
      <input
        type="checkbox"
        name="attr_sr6_kampf_fernkampf_edit_mode"
        class="sr6-editable-section-mode" />
      <span data-i18n="field.editieren">Editieren</span>
    </label>
  </div>

  <div class="sr6-charactersheet-box-content">
    <!-- BEGIN BLOCK: Repeating Fernkampfwaffen -->
    <fieldset class="repeating_sr6fernkampfwaffen">
      <div class="sr6-foundry-item">
        <div class="sr6-editable-item-fields">
        <div class="sr6-foundry-item-head sr6-charactersheet-row sr6-charactersheet-row-7">
          <div class="sr6-charactersheet-field">
            <span data-i18n="field.fernkampfwaffe">Fernkampfwaffe</span>
            <input type="text" name="attr_sr6_fernkampfwaffe" />
          </div>

          <div class="sr6-charactersheet-field">
            <span data-i18n="field.fertigkeit">Fertigkeit</span>
            <select name="attr_sr6_fernkampf_fertigkeit">
              <option value="Feuerwaffen" data-i18n="skill.feuerwaffen">Feuerwaffen</option>
              <option value="Exotische Waffen" data-i18n="skill.exotische_waffen">Exotische Waffen</option>
            </select>
          </div>

          <div class="sr6-charactersheet-field">
            <span data-i18n="field.waffentyp">Waffentyp</span>
            <select name="attr_sr6_fernkampf_waffentyp">
              <option value="Pistole" data-i18n="field.waffentyp_pistole">Pistole</option>
              <option value="Maschinenpistole" data-i18n="field.waffentyp_maschinenpistole">Maschinenpistole</option>
              <option value="Sturmgewehr" data-i18n="field.waffentyp_sturmgewehr">Sturmgewehr</option>
              <option value="Schrotflinte" data-i18n="field.waffentyp_schrotflinte">Schrotflinte</option>
              <option value="Scharfschützengewehr" data-i18n="field.waffentyp_scharfschuetzengewehr">Scharfschützengewehr</option>
              <option value="Schwere Waffe" data-i18n="field.waffentyp_schwere_waffe">Schwere Waffe</option>
              <option value="Werfer" data-i18n="field.waffentyp_werfer">Werfer</option>
              <option value="Bogen/Armbrust" data-i18n="field.waffentyp_bogen_armbrust">Bogen/Armbrust</option>
              <option value="Exotisch" data-i18n="field.waffentyp_exotisch">Exotisch</option>
            </select>
          </div>
          <div class="sr6-charactersheet-field">
            <span data-i18n="field.schaden">Schaden</span>
            <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_fernkampf_schaden::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_fernkampf_schaden" /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_fernkampf_schaden::1" aria-label="Erhoehen">+</button></div>
          </div>

          <div class="sr6-charactersheet-field">
            <span data-i18n="field.modus">Modus</span>
            <select name="attr_sr6_fernkampf_modus">
              <option value="EM">EM</option>
              <option value="HM">HM</option>
              <option value="SM - Eng">SM - Eng</option>
              <option value="SM - Breit">SM - Breit</option>
              <option value="AM">AM</option>
            </select>
          </div>

          <div class="sr6-charactersheet-field">
            <span data-i18n="field.magazin">Magazin</span>
            <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_fernkampf_magazin::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_fernkampf_magazin" /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_fernkampf_magazin::1" aria-label="Erhoehen">+</button></div>
          </div>

          <div class="sr6-charactersheet-field">
            <span data-i18n="field.ersatzmagazine">Ersatzmagazine</span>
            <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_fernkampf_ersatzmagazine::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_fernkampf_ersatzmagazine" /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_fernkampf_ersatzmagazine::1" aria-label="Erhoehen">+</button></div>
          </div>
        </div>

        <input type="hidden" name="attr_sr6_fernkampf_munition" value="Standard" />

        <div class="sr6-foundry-item-range sr6-charactersheet-row sr6-charactersheet-row-5 sr6-kampf-fernkampf-range-row">
          <div class="sr6-charactersheet-field sr6-kampf-fernkampf-range-field">
            <span data-i18n="field.s_nah">S. Nah</span>
            <div class="sr6-charactersheet-field-input-with-dice">
              <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_fernkampf_s_nah::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_fernkampf_s_nah" /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_fernkampf_s_nah::1" aria-label="Erhoehen">+</button></div><button
                type="action"
                class="sr6-charactersheet-field-dice-button"
                name="act_probe"
                value="&{template:default} {{name=Fernkampf-Test}} {{Waffe=@{sr6_fernkampfwaffe}}} {{Fertigkeit=@{sr6_fernkampf_fertigkeit}}} {{Schadenswert=@{sr6_fernkampf_schaden}}} {{Munition=@{sr6_fernkampf_munition}}} {{Reichweite=S. Nah}} {{Pool=[[@{sr6_fernkampf_s_nah}]]}} {{Erfolge=[[@{sr6_fernkampf_s_nah}d6>5]]}}"
                aria-label="Wuerfeln"></button>
            </div>
          </div>

          <div class="sr6-charactersheet-field sr6-kampf-fernkampf-range-field">
            <span data-i18n="field.nah">Nah</span>
            <div class="sr6-charactersheet-field-input-with-dice">
              <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_fernkampf_nah::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_fernkampf_nah" /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_fernkampf_nah::1" aria-label="Erhoehen">+</button></div><button
                type="action"
                class="sr6-charactersheet-field-dice-button"
                name="act_probe"
                value="&{template:default} {{name=Fernkampf-Test}} {{Waffe=@{sr6_fernkampfwaffe}}} {{Fertigkeit=@{sr6_fernkampf_fertigkeit}}} {{Schadenswert=@{sr6_fernkampf_schaden}}} {{Munition=@{sr6_fernkampf_munition}}} {{Reichweite=Nah}} {{Pool=[[@{sr6_fernkampf_nah}]]}} {{Erfolge=[[@{sr6_fernkampf_nah}d6>5]]}}"
                aria-label="Wuerfeln"></button>
            </div>
          </div>

          <div class="sr6-charactersheet-field sr6-kampf-fernkampf-range-field">
            <span data-i18n="field.mittel">Mittel</span>
            <div class="sr6-charactersheet-field-input-with-dice">
              <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_fernkampf_mittel::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_fernkampf_mittel" /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_fernkampf_mittel::1" aria-label="Erhoehen">+</button></div><button
                type="action"
                class="sr6-charactersheet-field-dice-button"
                name="act_probe"
                value="&{template:default} {{name=Fernkampf-Test}} {{Waffe=@{sr6_fernkampfwaffe}}} {{Fertigkeit=@{sr6_fernkampf_fertigkeit}}} {{Schadenswert=@{sr6_fernkampf_schaden}}} {{Munition=@{sr6_fernkampf_munition}}} {{Reichweite=Mittel}} {{Pool=[[@{sr6_fernkampf_mittel}]]}} {{Erfolge=[[@{sr6_fernkampf_mittel}d6>5]]}}"
                aria-label="Wuerfeln"></button>
            </div>
          </div>

          <div class="sr6-charactersheet-field sr6-kampf-fernkampf-range-field">
            <span data-i18n="field.weit">Weit</span>
            <div class="sr6-charactersheet-field-input-with-dice">
              <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_fernkampf_weit::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_fernkampf_weit" /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_fernkampf_weit::1" aria-label="Erhoehen">+</button></div><button
                type="action"
                class="sr6-charactersheet-field-dice-button"
                name="act_probe"
                value="&{template:default} {{name=Fernkampf-Test}} {{Waffe=@{sr6_fernkampfwaffe}}} {{Fertigkeit=@{sr6_fernkampf_fertigkeit}}} {{Schadenswert=@{sr6_fernkampf_schaden}}} {{Munition=@{sr6_fernkampf_munition}}} {{Reichweite=Weit}} {{Pool=[[@{sr6_fernkampf_weit}]]}} {{Erfolge=[[@{sr6_fernkampf_weit}d6>5]]}}"
                aria-label="Wuerfeln"></button>
            </div>
          </div>

          <div class="sr6-charactersheet-field sr6-kampf-fernkampf-range-field">
            <span data-i18n="field.s_weit">S. Weit</span>
            <div class="sr6-charactersheet-field-input-with-dice">
              <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_fernkampf_s_weit::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_fernkampf_s_weit" /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_fernkampf_s_weit::1" aria-label="Erhoehen">+</button></div><button
                type="action"
                class="sr6-charactersheet-field-dice-button"
                name="act_probe"
                value="&{template:default} {{name=Fernkampf-Test}} {{Waffe=@{sr6_fernkampfwaffe}}} {{Fertigkeit=@{sr6_fernkampf_fertigkeit}}} {{Schadenswert=@{sr6_fernkampf_schaden}}} {{Munition=@{sr6_fernkampf_munition}}} {{Reichweite=S. Weit}} {{Pool=[[@{sr6_fernkampf_s_weit}]]}} {{Erfolge=[[@{sr6_fernkampf_s_weit}d6>5]]}}"
                aria-label="Wuerfeln"></button>
            </div>
          </div>
        </div>

        <div class="sr6-foundry-item-footer sr6-charactersheet-row sr6-charactersheet-row-2">
          <div class="sr6-charactersheet-field sr6-charactersheet-mod-popup">
            <details>
              <summary data-i18n="field.modifikationen">Modifikationen</summary>
              <div class="sr6-charactersheet-mod-popup-panel">
                <span data-i18n="field.modifikationen">Modifikationen</span>
                <textarea
                  name="attr_sr6_fernkampf_modifikationen"
                  rows="4"
                  placeholder="z. B. Smartgun, Laufverlängerung, Gasventil"></textarea>
              </div>
            </details>
          </div>
          <label class="sr6-kampf-selection-toggle">
            <input type="checkbox" name="attr_sr6_fernkampf_ist_primaer" value="1" />
            <span data-i18n="field.primaere_fernkampfwaffe">Primäre Fernkampfwaffe</span>
          </label>
        </div>
        </div>
      </div>
    </fieldset>

</section>
