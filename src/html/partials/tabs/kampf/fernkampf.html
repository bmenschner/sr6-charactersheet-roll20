<!-- BEGIN BLOCK: Kampf Fernkampf -->
<section
  class="sr6-charactersheet-box sr6-charactersheet-box-kampf-fernkampf"
  aria-labelledby="kampf-fernkampf-titel">
  <h2
    id="kampf-fernkampf-titel"
    class="sr6-charactersheet-box-title"
    data-i18n="section.kampf_fernkampf">
    Fernkampfwaffen
  </h2>

  <div class="sr6-charactersheet-box-content">
    <!-- BEGIN BLOCK: Repeating Fernkampfwaffen -->
    <fieldset class="repeating_sr6fernkampfwaffen">
      <div class="sr6-foundry-item">
        <div class="sr6-foundry-item-head sr6-charactersheet-row sr6-charactersheet-row-3">
          <div class="sr6-charactersheet-field">
            <span data-i18n="field.fernkampfwaffe">Fernkampfwaffe</span>
            <input type="text" name="attr_sr6_fernkampfwaffe" />
          </div>

          <div class="sr6-charactersheet-field">
            <span data-i18n="field.fertigkeit">Fertigkeit</span>
            <select name="attr_sr6_fernkampf_fertigkeit">
              <option value="Feuerwaffen" data-i18n="skill.feuerwaffen">Feuerwaffen</option>
              <option value="Exotische Waffen" data-i18n="skill.exotische_waffen">Exotische Waffen</option>
            </select>
          </div>

          <div class="sr6-charactersheet-field">
            <span data-i18n="field.waffentyp">Waffentyp</span>
            <select name="attr_sr6_fernkampf_waffentyp">
              <option value="Pistole" data-i18n="field.waffentyp_pistole">Pistole</option>
              <option value="Maschinenpistole" data-i18n="field.waffentyp_maschinenpistole">Maschinenpistole</option>
              <option value="Sturmgewehr" data-i18n="field.waffentyp_sturmgewehr">Sturmgewehr</option>
              <option value="Schrotflinte" data-i18n="field.waffentyp_schrotflinte">Schrotflinte</option>
              <option value="Scharfschützengewehr" data-i18n="field.waffentyp_scharfschuetzengewehr">Scharfschützengewehr</option>
              <option value="Schwere Waffe" data-i18n="field.waffentyp_schwere_waffe">Schwere Waffe</option>
              <option value="Werfer" data-i18n="field.waffentyp_werfer">Werfer</option>
              <option value="Bogen/Armbrust" data-i18n="field.waffentyp_bogen_armbrust">Bogen/Armbrust</option>
              <option value="Exotisch" data-i18n="field.waffentyp_exotisch">Exotisch</option>
            </select>
          </div>
        </div>

        <div class="sr6-foundry-item-row sr6-charactersheet-row sr6-charactersheet-row-3">
          <div class="sr6-charactersheet-field">
            <span data-i18n="field.schaden">Schaden</span>
            <input type="text" name="attr_sr6_fernkampf_schaden" />
          </div>

          <div class="sr6-charactersheet-field">
            <span data-i18n="field.modus">Modus</span>
            <input type="text" name="attr_sr6_fernkampf_modus" />
          </div>

          <div class="sr6-charactersheet-field">
            <span data-i18n="field.munition">Munition</span>
            <select name="attr_sr6_fernkampf_munition">
              <option value="Standard" data-i18n="field.munition_standard">Standard</option>
              <option value="Huelsenlos" data-i18n="field.munition_huelsenlos">Hülsenlos</option>
              <option value="APDS" data-i18n="field.munition_apds">APDS</option>
              <option value="Explosiv" data-i18n="field.munition_explosiv">Explosiv</option>
              <option value="Flechette" data-i18n="field.munition_flechette">Flechette</option>
              <option value="Gel" data-i18n="field.munition_gel">Gel</option>
              <option value="Injektionspfeil" data-i18n="field.munition_injektionspfeil">Injektionspfeil</option>
              <option value="Schocker" data-i18n="field.munition_schocker">Schocker</option>
              <option value="DMSO-Gelpack" data-i18n="field.munition_dmso_gelpack">DMSO-Gelpack</option>
            </select>
          </div>
        </div>

        <div class="sr6-foundry-item-range sr6-charactersheet-row sr6-charactersheet-row-5">
          <div class="sr6-charactersheet-field">
            <span data-i18n="field.s_nah">S. Nah</span>
            <div class="sr6-charactersheet-field-input-with-dice">
              <input type="text" name="attr_sr6_fernkampf_s_nah" /><button
                type="roll"
                class="sr6-charactersheet-field-dice-button"
                name="roll_sr6_fernkampf_s_nah"
                value="&{template:default} {{name=Fernkampf-Test}} {{Waffe=@{sr6_fernkampfwaffe}}} {{Reichweite=S. Nah}} {{Pool=[[@{sr6_fernkampf_s_nah}]]}} {{Erfolge=[[@{sr6_fernkampf_s_nah}d6>5]]}}"
                aria-label="Wuerfeln"></button>
            </div>
          </div>

          <div class="sr6-charactersheet-field">
            <span data-i18n="field.nah">Nah</span>
            <div class="sr6-charactersheet-field-input-with-dice">
              <input type="text" name="attr_sr6_fernkampf_nah" /><button
                type="roll"
                class="sr6-charactersheet-field-dice-button"
                name="roll_sr6_fernkampf_nah"
                value="&{template:default} {{name=Fernkampf-Test}} {{Waffe=@{sr6_fernkampfwaffe}}} {{Reichweite=Nah}} {{Pool=[[@{sr6_fernkampf_nah}]]}} {{Erfolge=[[@{sr6_fernkampf_nah}d6>5]]}}"
                aria-label="Wuerfeln"></button>
            </div>
          </div>

          <div class="sr6-charactersheet-field">
            <span data-i18n="field.mittel">Mittel</span>
            <div class="sr6-charactersheet-field-input-with-dice">
              <input type="text" name="attr_sr6_fernkampf_mittel" /><button
                type="roll"
                class="sr6-charactersheet-field-dice-button"
                name="roll_sr6_fernkampf_mittel"
                value="&{template:default} {{name=Fernkampf-Test}} {{Waffe=@{sr6_fernkampfwaffe}}} {{Reichweite=Mittel}} {{Pool=[[@{sr6_fernkampf_mittel}]]}} {{Erfolge=[[@{sr6_fernkampf_mittel}d6>5]]}}"
                aria-label="Wuerfeln"></button>
            </div>
          </div>

          <div class="sr6-charactersheet-field">
            <span data-i18n="field.weit">Weit</span>
            <div class="sr6-charactersheet-field-input-with-dice">
              <input type="text" name="attr_sr6_fernkampf_weit" /><button
                type="roll"
                class="sr6-charactersheet-field-dice-button"
                name="roll_sr6_fernkampf_weit"
                value="&{template:default} {{name=Fernkampf-Test}} {{Waffe=@{sr6_fernkampfwaffe}}} {{Reichweite=Weit}} {{Pool=[[@{sr6_fernkampf_weit}]]}} {{Erfolge=[[@{sr6_fernkampf_weit}d6>5]]}}"
                aria-label="Wuerfeln"></button>
            </div>
          </div>

          <div class="sr6-charactersheet-field">
            <span data-i18n="field.s_weit">S. Weit</span>
            <div class="sr6-charactersheet-field-input-with-dice">
              <input type="text" name="attr_sr6_fernkampf_s_weit" /><button
                type="roll"
                class="sr6-charactersheet-field-dice-button"
                name="roll_sr6_fernkampf_s_weit"
                value="&{template:default} {{name=Fernkampf-Test}} {{Waffe=@{sr6_fernkampfwaffe}}} {{Reichweite=S. Weit}} {{Pool=[[@{sr6_fernkampf_s_weit}]]}} {{Erfolge=[[@{sr6_fernkampf_s_weit}d6>5]]}}"
                aria-label="Wuerfeln"></button>
            </div>
          </div>
        </div>

        <div class="sr6-foundry-item-footer sr6-charactersheet-row sr6-charactersheet-row-1">
          <div class="sr6-charactersheet-field sr6-charactersheet-mod-popup">
            <details>
              <summary data-i18n="field.modifikationen">Modifikationen</summary>
              <div class="sr6-charactersheet-mod-popup-panel">
                <span data-i18n="field.modifikationen">Modifikationen</span>
                <textarea
                  name="attr_sr6_fernkampf_modifikationen"
                  rows="4"
                  placeholder="z. B. Smartgun, Laufverlängerung, Gasventil"></textarea>
              </div>
            </details>
          </div>
        </div>
      </div>
    </fieldset>
    <!-- END BLOCK: Repeating Fernkampfwaffen -->
  </div>
</section>
<!-- END BLOCK: Kampf Fernkampf -->
