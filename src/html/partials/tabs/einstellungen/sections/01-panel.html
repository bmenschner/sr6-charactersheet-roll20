<!-- BEGIN BLOCK: Einstellungen -->
            <div class="sr6-settings-panel">
              <!-- BEGIN BLOCK: Sprachumschalter für Runtime-i18n -->
              <div class="sr6-language-control">
                <label for="sr6-language-select" data-i18n="ui.sprache"
                  >Sprache</label
                >
                <select id="sr6-language-select" name="attr_sr6_ui_sprache">
                  <option value="de" data-i18n="ui.sprache_de">DE</option>
                  <option value="en" data-i18n="ui.sprache_en">EN</option>
                  <option value="fr" data-i18n="ui.sprache_fr">FR</option>
                </select>
              </div>
              <!-- END BLOCK: Sprachumschalter für Runtime-i18n -->

              <!-- BEGIN BLOCK: Konfigurationsfelder -->
              <div class="sr6-charactersheet-row sr6-charactersheet-row-2">
                <label class="sr6-charactersheet-field">
                  <span data-i18n="field.option_auto_berechnung"
                    >Auto-Berechnung</span
                  >
                  <input
                    type="text"
                    name="attr_sr6_setting_auto_berechnung"
                    value="an" />
                </label>

                <label class="sr6-charactersheet-field">
                  <span data-i18n="field.option_rolltemplate"
                    >Rolltemplate-Stil</span
                  >
                  <input
                    type="text"
                    name="attr_sr6_setting_rolltemplate"
                    value="default" />
                </label>

                <label class="sr6-charactersheet-field">
                  <span data-i18n="field.option_popup_modifikatoren"
                    >Popup-Modifikatoren</span
                  >
                  <select name="attr_sr6_setting_popup_mods">
                    <option value="eigen" data-i18n="field.option_popup_eigen">Eigenes Popup (Standard)</option>
                    <option value="roll20" data-i18n="field.option_popup_roll20">Roll20-Fallback</option>
                  </select>
                </label>
              </div>
              <!-- END BLOCK: Konfigurationsfelder -->
            </div>
<!-- END BLOCK: Einstellungen -->
