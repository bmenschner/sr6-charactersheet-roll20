<!-- Block: Magie Kernwerte -->
            <section
              class="sr6-charactersheet-box"
              aria-labelledby="magie-kern-titel">
              <h2
                id="magie-kern-titel"
                class="sr6-charactersheet-box-title"
                data-i18n="section.magie_kern">
                Magie: Kernwerte
              </h2>

              <div class="sr6-charactersheet-box-content">
                <div class="sr6-charactersheet-row sr6-charactersheet-row-2">
                  <label class="sr6-charactersheet-field">
                    <span data-i18n="field.magische_tradition"
                      >Magische Tradition</span
                    >
                    <input type="text" name="attr_sr6_magic_tradition" />
                  </label>

                  <label class="sr6-charactersheet-field">
                    <span data-i18n="field.zauberpool">Zauberpool</span>
                    <div class="sr6-charactersheet-field-input-with-dice">
                      <input
                        type="text"
                        name="attr_sr6_magic_zauberpool" /><button
                        type="roll"
                        class="sr6-charactersheet-field-dice-button"
                        name="roll_sr6_tab_magie_zauberpool"
                        value="&{template:default} {{name=Magie-Test}} {{Pool=[[@{sr6_magic_zauberpool}]]}} {{Erfolge=[[@{sr6_magic_zauberpool}d6cs>4]]}}"
                        aria-label="Wuerfeln"></button>
                    </div>
                  </label>
                </div>

                <div class="sr6-charactersheet-row sr6-charactersheet-row-3">
                  <label class="sr6-charactersheet-field">
                    <span data-i18n="field.entzug">Entzug</span>
                    <input type="text" name="attr_sr6_magic_entzug" />
                  </label>

                  <label class="sr6-charactersheet-field">
                    <span data-i18n="field.entzug_widerstand"
                      >Entzugwiderstand</span
                    >
                    <div class="sr6-charactersheet-field-input-with-dice">
                      <input
                        type="text"
                        name="attr_sr6_magic_entzug_widerstand" /><button
                        type="roll"
                        class="sr6-charactersheet-field-dice-button"
                        name="roll_sr6_tab_magie_entzug_widerstand"
                        value="&{template:default} {{name=Entzugwiderstand}} {{Pool=[[@{sr6_magic_entzug_widerstand}]]}} {{Erfolge=[[@{sr6_magic_entzug_widerstand}d6cs>4]]}}"
                        aria-label="Wuerfeln"></button>
                    </div>
                  </label>

                  <label class="sr6-charactersheet-field">
                    <span data-i18n="field.rituale_foki">Rituale/Foki</span>
                    <input type="text" name="attr_sr6_magic_rituale_foki" />
                  </label>
                </div>
              </div>
            </section>
<!-- End Block: Magie Kernwerte -->
