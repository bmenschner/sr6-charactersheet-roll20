  <!-- BEGIN BLOCK: Ausruestung -->
  <section
    class="sr6-charactersheet-box sr6-charactersheet-tab-ausruestung-item--full sr6-editable-section sr6-ausruestung-section"
    aria-labelledby="ausruestung-titel">
    <div class="sr6-editable-section-title-row">
      <h2 id="ausruestung-titel" class="sr6-charactersheet-box-title" data-i18n="section.ausruestung">
        Ausrüstung
      </h2>
      <label class="sr6-editable-section-toggle">
        <input
          type="checkbox"
          name="attr_sr6_ausruestung_edit_mode"
          class="sr6-editable-section-mode"
                      />
                    <span data-i18n="field.editieren">Editieren</span>
      </label>
    </div>
    <div class="sr6-charactersheet-box-content">
      <div class="sr6-generic-list-header sr6-generic-list-header--6" aria-hidden="true">
        <span data-i18n="field.name">Name</span>
        <span data-i18n="field.bezug">Bezug</span>
        <span data-i18n="field.stufe">Stufe</span>
        <span data-i18n="field.anzahl">Anzahl</span>
        <span data-i18n="field.notiz">Notiz</span>
        <div class="sr6-field-label-with-info"><span data-i18n="field.probe">Probe</span><span class="sr6-info-icon" title="Probe = gewähltes Attribut oder gewählte Fertigkeit + Stufe; ohne Auswahl nur Stufe; Popup kann Stufe x2 nutzen">i</span></div>
      </div>
      <fieldset class="repeating_sr6ausruestung">
        <div class="sr6-foundry-item">
          <div class="sr6-editable-item-fields">
            <div class="sr6-foundry-item-head sr6-charactersheet-row sr6-charactersheet-row-6">
              <div class="sr6-charactersheet-field">
                <span data-i18n="field.name">Name</span>
                <input type="text" name="attr_sr6_ausruestung_name" />
              </div>
              <div class="sr6-charactersheet-field">
                <span data-i18n="field.bezug">Bezug</span>
                <select name="attr_sr6_ausruestung_bezug">
                  <option value="" data-i18n="field.keine_auswahl" selected>Keine Auswahl</option>
                  <option value="attr:konstitution" data-i18n="field.konstitution">Konstitution</option>
                  <option value="attr:geschicklichkeit" data-i18n="field.geschicklichkeit">Geschicklichkeit</option>
                  <option value="attr:reaktion" data-i18n="field.reaktion">Reaktion</option>
                  <option value="attr:staerke" data-i18n="field.staerke">Stärke</option>
                  <option value="attr:willenskraft" data-i18n="field.willenskraft">Willenskraft</option>
                  <option value="attr:logik" data-i18n="field.logik">Logik</option>
                  <option value="attr:intuition" data-i18n="field.intuition">Intuition</option>
                  <option value="attr:charisma" data-i18n="field.charisma">Charisma</option>
                  <option value="attr:edge" data-i18n="field.edge">Edge</option>
                  <option value="attr:magie_resonanz" data-i18n="field.magie_resonanz">Magie/Resonanz</option>
                  <option value="skill:astral" data-i18n="skill.astral">Astral</option>
                  <option value="skill:athletik" data-i18n="skill.athletik">Athletik</option>
                  <option value="skill:beschwoeren" data-i18n="skill.beschwoeren">Beschwören</option>
                  <option value="skill:biotech" data-i18n="skill.biotech">Biotech</option>
                  <option value="skill:cracken" data-i18n="skill.cracken">Cracken</option>
                  <option value="skill:einfluss" data-i18n="skill.einfluss">Einfluss</option>
                  <option value="skill:elektronik" data-i18n="skill.elektronik">Elektronik</option>
                  <option value="skill:exotische_waffen" data-i18n="skill.exotische_waffen">Exotische Waffen</option>
                  <option value="skill:feuerwaffen" data-i18n="skill.feuerwaffen">Feuerwaffen</option>
                  <option value="skill:heimlichkeit" data-i18n="skill.heimlichkeit">Heimlichkeit</option>
                  <option value="skill:hexerei" data-i18n="skill.hexerei">Hexerei</option>
                  <option value="skill:mechanik" data-i18n="skill.mechanik">Mechanik</option>
                  <option value="skill:nahkampf" data-i18n="skill.nahkampf">Nahkampf</option>
                  <option value="skill:natur" data-i18n="skill.natur">Natur</option>
                  <option value="skill:steuern" data-i18n="skill.steuern">Steuern</option>
                  <option value="skill:tasken" data-i18n="skill.tasken">Tasken</option>
                  <option value="skill:ueberreden" data-i18n="skill.ueberreden">Überreden</option>
                  <option value="skill:verzaubern" data-i18n="skill.verzaubern">Verzaubern</option>
                  <option value="skill:wahrnehmung" data-i18n="skill.wahrnehmung">Wahrnehmung</option>
                </select>
              </div>
              <div class="sr6-charactersheet-field">
                <span data-i18n="field.stufe">Stufe</span>
                <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_ausruestung_stufe::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_ausruestung_stufe" /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_ausruestung_stufe::1" aria-label="Erhoehen">+</button></div>
              </div>
              <div class="sr6-charactersheet-field">
                <span data-i18n="field.anzahl">Anzahl</span>
                <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_ausruestung_anzahl::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_ausruestung_anzahl" /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_ausruestung_anzahl::1" aria-label="Erhoehen">+</button></div>
              </div>
              <div class="sr6-charactersheet-field">
                <span data-i18n="field.notiz">Notiz</span>
                <input type="text" name="attr_sr6_ausruestung_notiz" />
              </div>
              <div class="sr6-charactersheet-field">
                <div class="sr6-field-label-with-info"><span data-i18n="field.probe">Probe</span><span class="sr6-info-icon" title="Probe = gewähltes Attribut oder gewählte Fertigkeit + Stufe; ohne Auswahl nur Stufe; Popup kann Stufe x2 nutzen">i</span></div>
                <div class="sr6-charactersheet-field-input-with-dice sr6-charactersheet-field-input-with-dice--compact">
                  <span aria-hidden="true"></span>
                  <button
                    type="action"
                    class="sr6-charactersheet-field-dice-button"
                    name="act_probe"
                    value="&{template:default} {{name=Ausrüstung}} {{Ausrüstung=@{sr6_ausruestung_name}}} {{Auswahl=@{sr6_ausruestung_bezug}}} {{Stufe=@{sr6_ausruestung_stufe}}} {{Pool=[[@{sr6_ausruestung_stufe}]]}} {{Erfolge=[[@{sr6_ausruestung_stufe}d6&gt;5]]}}"
                    aria-label="Wuerfeln"></button>
                </div>
              </div>
            </div>
            <div class="sr6-foundry-item-footer sr6-charactersheet-row sr6-charactersheet-row-1 sr6-repeater-notes-mod-row">
              <div class="sr6-charactersheet-field sr6-charactersheet-mod-popup sr6-repeater-notes-mod-field">
                <details>
                  <summary data-i18n="field.notizen_zubehoer_modifikationen">Notizen, Zubehör, Modifikationen</summary>
                  <div class="sr6-charactersheet-mod-popup-panel">
                    <span data-i18n="field.notizen_zubehoer_modifikationen">Notizen, Zubehör, Modifikationen</span>
                    <textarea name="attr_sr6_item_notizen_zubehoer_modifikationen" rows="4"></textarea>
                  </div>
                </details>
              </div>
            </div>
          </div>
        </div>
      </fieldset>
    </div>
  </section>
  <!-- END BLOCK: Ausruestung -->
