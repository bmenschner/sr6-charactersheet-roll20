<!-- BEGIN BLOCK: Biographie SIN -->
              <section class="sr6-charactersheet-box sr6-editable-section sr6-sin-section" aria-labelledby="bio-sin-titel">
                <div class="sr6-editable-section-title-row">
                  <h2 id="bio-sin-titel" class="sr6-charactersheet-box-title" data-i18n="section.sin">
                    SIN
                  </h2>
                  <label class="sr6-editable-section-toggle">
                    <input
                      type="checkbox"
                      name="attr_sr6_sin_edit_mode"
                      class="sr6-editable-section-mode"
                    />
                    <span data-i18n="field.editieren">Editieren</span>
                  </label>
                </div>
                <div class="sr6-charactersheet-box-content">
                  <div class="sr6-generic-list-header sr6-generic-list-header--3" aria-hidden="true">
                    <span data-i18n="field.name">Name</span>
                    <span data-i18n="field.stufe">Stufe</span>
                    <span aria-hidden="true"></span>
                  </div>
                  <fieldset class="repeating_sr6sin">
                    <div class="sr6-foundry-item">
                      <div class="sr6-editable-item-fields">
                        <div class="sr6-foundry-item-head sr6-charactersheet-row sr6-charactersheet-row-3">
                          <div class="sr6-charactersheet-field">
                            <span data-i18n="field.name">Name</span>
                            <input type="text" name="attr_sr6_sin_name" />
                          </div>
                          <div class="sr6-charactersheet-field">
                            <span data-i18n="field.stufe">Stufe</span>
                            <div class="sr6-number-stepper"><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--minus" name="act_sr6_number_step" value="sr6_sin_stufe::-1" aria-label="Verringern">-</button><input type="number" name="attr_sr6_sin_stufe" /><button type="action" class="sr6-number-stepper-button sr6-number-stepper-button--plus" name="act_sr6_number_step" value="sr6_sin_stufe::1" aria-label="Erhoehen">+</button></div>
                          </div>
                          <div class="sr6-charactersheet-field">
                            <span aria-hidden="true"></span>
                            <div class="sr6-charactersheet-field-input-with-dice sr6-charactersheet-field-input-with-dice--compact">
                              <span aria-hidden="true"></span>
                              <button
                                type="action"
                                class="sr6-charactersheet-field-dice-button"
                                name="act_probe"
                                value="&{template:default} {{name=SIN}} {{SIN=@{sr6_sin_name}}} {{Stufe=@{sr6_sin_stufe}}} {{Pool=[[@{sr6_sin_stufe}]]}} {{Erfolge=[[@{sr6_sin_stufe}d6&gt;5]]}}"
                                aria-label="Wuerfeln"></button>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </fieldset>
                </div>
              </section>
<!-- END BLOCK: Biographie SIN -->
